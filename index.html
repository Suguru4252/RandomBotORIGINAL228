<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎲 МОНОПОЛИЯ DELUXE - Классическая игра</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark: #1f2937;
            --light: #f9fafb;
            --gray: #9ca3af;
            --board-bg: #e5e7eb;
            
            /* Цвета групп (точь-в-точь с классики) */
            --brown: #8B4513;
            --lightblue: #7ec8e0;
            --pink: #ed7fb5;
            --orange: #faa634;
            --red: #e64848;
            --yellow: #f5d742;
            --green: #5aa45a;
            --blue: #3f6ba5;
            --railroad: #4b5563;
            --utility: #b1c800;
            
            --board-size: min(700px, 65vw);
        }

        body {
            background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        /* ОСНОВНОЙ КОНТЕЙНЕР ИГРЫ */
        #game-container {
            width: 100%;
            max-width: 1600px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        /* ЭКРАН ВХОДА */
        #login-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 48px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 550px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            animation: float 3s infinite ease-in-out;
        }

        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }

        .game-title {
            font-size: 4em;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .game-subtitle {
            color: var(--gray);
            margin-bottom: 30px;
            font-size: 1.2em;
        }

        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--dark);
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e5e7eb;
            border-radius: 30px;
            font-size: 1.1em;
            transition: all 0.3s;
            background: #f9fafb;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99,102,241,0.2);
        }

        /* ВЫБОР ПЕРСОНАЖЕЙ */
        .character-selector {
            margin: 30px 0;
            background: #f3f4f6;
            padding: 20px;
            border-radius: 40px;
        }

        .character-selector h3 {
            margin-bottom: 15px;
            color: var(--dark);
        }

        .character-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .character-option {
            text-align: center;
            padding: 15px 5px;
            border: 3px solid transparent;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .character-option:hover {
            transform: scale(1.05);
            border-color: var(--primary);
        }

        .character-option.selected {
            border-color: var(--success);
            background: #ecfdf5;
            box-shadow: 0 0 0 3px var(--success);
        }

        .character-option .emoji { font-size: 2.5em; }
        .character-option .name { font-weight: 500; }

        .btn {
            padding: 15px 25px;
            border: none;
            border-radius: 40px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin-bottom: 10px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .btn.primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(99,102,241,0.5);
        }

        .btn.secondary {
            background: white;
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .btn.small {
            padding: 10px 20px;
            font-size: 0.9em;
            width: auto;
        }

        /* ЭКРАН ИГРЫ */
        #game-screen {
            display: none;
        }

        .game-header {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 60px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.2);
        }

        .game-info {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .game-code {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .turn-indicator {
            background: var(--success);
            color: white;
            padding: 8px 25px;
            border-radius: 40px;
            font-weight: bold;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }

        .start-game-btn {
            background: linear-gradient(135deg, var(--warning), #d97706);
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
        }

        /* ОСНОВНОЙ ЛЭЙАУТ */
        .game-main {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .board-container {
            flex: 3;
            min-width: 650px;
        }

        /* ПОЛЕ — ТОЧНО КАК НА ЭТАЛОНЕ */
        .monopoly-board {
            width: var(--board-size);
            height: var(--board-size);
            background: white;
            border-radius: 40px;
            display: grid;
            grid-template-columns: repeat(11, 1fr);
            grid-template-rows: repeat(11, 1fr);
            gap: 2px;
            padding: 2px;
            background: #cbd5e1;
            box-shadow: 0 25px 50px -12px black;
            border: 4px solid #1e293b;
            margin-bottom: 20px;
        }

        .board-cell {
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.65em;
            text-align: center;
            padding: 2px;
            position: relative;
            border: 1px solid #d1d5db;
            transition: 0.15s;
            cursor: pointer;
        }

        .board-cell:hover {
            filter: brightness(0.95);
            transform: scale(1.02);
            z-index: 5;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* ЦВЕТНЫЕ ПОЛОСКИ ГРУПП */
        .color-strip {
            width: 100%;
            height: 6px;
            position: absolute;
            top: 0;
            left: 0;
            border-radius: 2px 2px 0 0;
        }
        .brown { background: var(--brown); }
        .lightblue { background: var(--lightblue); }
        .pink { background: var(--pink); }
        .orange { background: var(--orange); }
        .red { background: var(--red); }
        .yellow { background: var(--yellow); }
        .green { background: var(--green); }
        .blue { background: var(--blue); }
        .railroad { background: var(--railroad); }
        .utility { background: var(--utility); }

        .cell-name {
            font-weight: bold;
            font-size: 0.65em;
            margin-top: 8px;
            color: #1f2937;
        }

        .cell-price {
            font-size: 0.6em;
            color: var(--primary);
            font-weight: 600;
        }

        .buildings {
            display: flex;
            gap: 2px;
            margin-top: 2px;
        }
        .building {
            width: 8px;
            height: 8px;
            border-radius: 2px;
        }
        .house { background: #10b981; }
        .hotel { background: #ef4444; width: 12px; }

        .player-tokens {
            position: absolute;
            bottom: 2px;
            left: 2px;
            display: flex;
            gap: 2px;
            flex-wrap: wrap;
        }
        .token {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            border: 2px solid white;
            box-shadow: 0 2px 4px black;
        }

        .dice-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .dice-container {
            display: flex;
            gap: 30px;
            justify-content: center;
        }

        .dice {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5em;
            box-shadow: 0 10px 15px -3px black;
            border: 3px solid var(--dark);
            transition: 0.2s;
        }

        .dice.rolling {
            animation: roll 0.3s infinite;
        }
        @keyframes roll { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* САЙДБАР */
        .sidebar {
            flex: 1;
            min-width: 300px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            box-shadow: 0 20px 25px -5px black;
        }

        .players-panel h3, .chat-panel h3 {
            color: var(--primary);
            margin-bottom: 15px;
            font-size: 1.5em;
        }

        .player-card {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: #f3f4f6;
            border-radius: 30px;
            margin-bottom: 10px;
            border-left: 6px solid transparent;
            transition: 0.2s;
        }

        .player-card.current-turn {
            border-left-color: var(--success);
            background: #ecfdf5;
            box-shadow: 0 0 0 3px var(--success);
        }

        .player-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2);
        }

        .player-info { flex: 1; }
        .player-name { font-weight: bold; font-size: 1.1em; }
        .player-money { color: var(--success); font-weight: 600; }

        .chat-messages {
            height: 250px;
            overflow-y: auto;
            background: #f3f4f6;
            border-radius: 30px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .chat-message {
            margin-bottom: 10px;
            padding: 8px 12px;
            background: white;
            border-radius: 20px;
        }

        .chat-sender { font-weight: bold; color: var(--primary); }

        .chat-input {
            display: flex;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #e5e7eb;
            border-radius: 40px;
        }

        .chat-input button {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            border: none;
            font-size: 1.2em;
            cursor: pointer;
        }

        /* НИЖНЯЯ ПАНЕЛЬ */
        .game-footer {
            margin-top: 20px;
            background: rgba(255,255,255,0.95);
            border-radius: 60px;
            padding: 20px 30px;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn.action {
            background: white;
            color: var(--primary);
            border: 2px solid var(--primary);
            padding: 12px 25px;
            font-size: 1em;
            flex: 1;
            min-width: 120px;
        }

        .btn.action:hover {
            background: var(--primary);
            color: white;
        }

        /* МОДАЛКИ */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: white;
            border-radius: 60px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            animation: modalPop 0.3s;
        }

        @keyframes modalPop {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .close {
            float: right;
            font-size: 2em;
            cursor: pointer;
            color: var(--gray);
        }

        /* НОУТИФИКАЦИИ */
        .notification {
            position: fixed;
            top: 30px;
            right: 30px;
            padding: 20px 35px;
            border-radius: 60px;
            background: white;
            box-shadow: 0 20px 25px -5px black;
            z-index: 2000;
            animation: slideInRight 0.3s, fadeOut 0.3s 2.7s;
            font-weight: 600;
            border-left: 8px solid var(--success);
        }

        .notification.warning { border-left-color: var(--warning); }
        .notification.error { border-left-color: var(--danger); }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        /* СПИСОК ИГР */
        .games-container {
            max-height: 400px;
            overflow-y: auto;
        }
        .game-item {
            padding: 20px;
            border: 2px solid #e5e7eb;
            border-radius: 30px;
            margin-bottom: 15px;
        }
        .game-item-code { font-weight: bold; color: var(--primary); }
        .game-item-join button { width: 100%; }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- ЭКРАН ВХОДА -->
        <div id="login-screen">
            <div class="login-card">
                <h1 class="game-title">🎲 МОНОПОЛИЯ</h1>
                <p class="game-subtitle">DELUXE EDITION</p>
                
                <div class="input-group">
                    <label>👤 Ваше имя</label>
                    <input type="text" id="player-name" placeholder="Введите имя" maxlength="20">
                </div>
                
                <div class="character-selector">
                    <h3>🎭 Выберите фигурку</h3>
                    <div class="character-grid" id="character-grid">
                        <div class="character-option selected" data-char="dino" onclick="selectChar('dino')"><div class="emoji">🦖</div><div class="name">Динозавр</div></div>
                        <div class="character-option" data-char="duck" onclick="selectChar('duck')"><div class="emoji">🦆</div><div class="name">Утка</div></div>
                        <div class="character-option" data-char="car" onclick="selectChar('car')"><div class="emoji">🚗</div><div class="name">Машина</div></div>
                        <div class="character-option" data-char="hat" onclick="selectChar('hat')"><div class="emoji">🧢</div><div class="name">Шапка</div></div>
                        <div class="character-option" data-char="ship" onclick="selectChar('ship')"><div class="emoji">⛵</div><div class="name">Корабль</div></div>
                        <div class="character-option" data-char="dog" onclick="selectChar('dog')"><div class="emoji">🐕</div><div class="name">Пёс</div></div>
                    </div>
                </div>
                
                <button class="btn primary" onclick="createGame()">✨ СОЗДАТЬ ИГРУ</button>
                <button class="btn secondary" onclick="showGamesList()">📋 СПИСОК ИГР</button>
                
                <div id="games-list" style="margin-top: 20px; display: none;">
                    <h3>📋 Доступные игры:</h3>
                    <div id="games-container" class="games-container"></div>
                </div>
            </div>
        </div>

        <!-- ЭКРАН ИГРЫ -->
        <div id="game-screen">
            <div class="game-header">
                <div class="game-info">
                    <span class="game-code" id="game-code">🔑 ----</span>
                    <span class="turn-indicator" id="turn-indicator">⏳ Ожидание игроков...</span>
                    <button class="start-game-btn" id="start-game-btn" onclick="startGame()" style="display: none;">▶ СТАРТ</button>
                </div>
                <button class="btn small" onclick="leaveGame()">🚪 Выйти</button>
            </div>

            <div class="game-main">
                <div class="board-container">
                    <div class="monopoly-board" id="board"></div>
                    
                    <div class="dice-area">
                        <div class="dice-container">
                            <div class="dice" id="dice1">⚀</div>
                            <div class="dice" id="dice2">⚀</div>
                        </div>
                        <button class="btn primary" id="roll-dice" onclick="rollDice()" style="width: 250px;">🎲 БРОСИТЬ КОСТИ</button>
                    </div>
                </div>

                <div class="sidebar">
                    <div class="players-panel">
                        <h3>👥 ИГРОКИ (<span id="player-count">0</span>/6)</h3>
                        <div id="players-list"></div>
                    </div>

                    <div class="chat-panel">
                        <h3>💬 ЧАТ</h3>
                        <div class="chat-messages" id="chat-messages"></div>
                        <div class="chat-input">
                            <input type="text" id="chat-input" placeholder="Введите сообщение..." onkeypress="if(event.key==='Enter') sendChat()">
                            <button onclick="sendChat()">➤</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="game-footer">
                <div class="action-buttons">
                    <button class="btn action" onclick="showMyCards()">🏠 МОИ УЛИЦЫ</button>
                    <button class="btn action" onclick="openTradeModal()">🔄 ТРЕЙД</button>
                    <button class="btn action" onclick="buildHouse()">🏗️ ДОМ</button>
                    <button class="btn action" onclick="buildHotel()">🏨 ОТЕЛЬ</button>
                    <button class="btn action" onclick="endTurn()">⏭️ ЗАВЕРШИТЬ ХОД</button>
                </div>
            </div>
        </div>

        <!-- МОДАЛКА ПОКУПКИ -->
        <div class="modal" id="property-modal">
            <div class="modal-content">
                <span class="close" onclick="closeModal('property-modal')">&times;</span>
                <h2 id="prop-name"></h2>
                <div id="prop-details"></div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn primary" onclick="buyProperty()">💰 КУПИТЬ</button>
                    <button class="btn secondary" onclick="openAuctionModal()">🏷️ АУКЦИОН</button>
                </div>
            </div>
        </div>

        <!-- МОДАЛКА АУКЦИОНА -->
        <div class="modal" id="auction-modal">
            <div class="modal-content">
                <span class="close" onclick="closeModal('auction-modal')">&times;</span>
                <h2>🏷️ АУКЦИОН</h2>
                <div id="auction-info"></div>
                <input type="number" id="bid-amount" placeholder="Ваша ставка (мин 10)" min="10" style="width: 100%; padding: 15px; margin: 15px 0; border-radius: 40px; border: 2px solid var(--primary);">
                <button class="btn primary" onclick="placeBid()">СДЕЛАТЬ СТАВКУ</button>
            </div>
        </div>

        <!-- МОДАЛКА ТРЕЙДА -->
        <div class="modal" id="trade-modal">
            <div class="modal-content">
                <span class="close" onclick="closeModal('trade-modal')">&times;</span>
                <h2>🔄 ОБМЕН</h2>
                <div id="trade-content"></div>
            </div>
        </div>
    </div>

    <script>
        // ==================== ГЛОБАЛЫ ====================
        let games = {};
        let currentGame = null;
        let currentPlayer = null;
        let selectedCell = null;
        let currentAuction = null;
        let auctionTimer = null;
        let tradeTarget = null;
        let selectedMyProps = [];
        let selectedHisProps = [];
        let myMoneyOffer = 0;
        let hisMoneyOffer = 0;
        let selectedCharacter = 'dino';

        // ЭМОДЗИ ПЕРСОНАЖЕЙ
        const charEmojis = { dino: '🦖', duck: '🦆', car: '🚗', hat: '🧢', ship: '⛵', dog: '🐕' };

        // ЦВЕТА ИГРОКОВ
        const playerColors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEEAD', '#D4A5A5'];

        // ==================== ПОЛЕ (ТОЧНО С ЭТАЛОНА) ====================
        const boardData = [
            { pos:0, name:"СТАРТ", price:0, color:"special", rent:[0], group:"special" },
            { pos:1, name:"УЛ. ПОБЕДЫ", price:60, color:"brown", rent:[2,10,30,90,160,250], housePrice:50, group:"brown" },
            { pos:2, name:"КАЗНА", price:0, color:"special", rent:[0], group:"special" },
            { pos:3, name:"ПР. МИРА", price:60, color:"brown", rent:[4,20,60,180,320,450], housePrice:50, group:"brown" },
            { pos:4, name:"НАЛОГ", price:200, color:"tax", rent:[200], group:"tax" },

        function joinGame(gameId) {

            games = JSON.parse(localStorage.getItem('monopolyGames')||'{}');

            if(!game) return showNotif('Игра не найдена','error');
            if(game.started) return showNotif('Уже началась','error');
            if(game.players.length>=6) return showNotif('Лобби полно','error');
            if(game.players.some(p=>p.name===name)) return showNotif('Имя занято','error');
            if(game.players.some(p=>p.character===selectedCharacter)) return showNotif('Фигурка занята','error');
            
            currentPlayer = {
                id:'p'+Date.now()+Math.random(), name, character:selectedCharacter,
                money:1500, pos:0, props:[], inJail:false, jailTurns:0, jailCards:0, alive:true,
                color: playerColors[game.players.length%playerColors.length]
            };
            game.players.push(currentPlayer);
            currentGame=game; games[gameId]=game; localStorage.setItem('monopolyGames',JSON.stringify(games));
            showGameScreen(); renderBoard(); updatePlayers(); updateStartBtn();
            addChat('system', `${name} присоединился`);

        // ==================== ОТОБРАЖЕНИЕ ПОЛЯ ====================
        function renderBoard() {
            if(!currentGame) return;
            const board = document.getElementById('board');
            board.innerHTML = '';
            const order = [];
            for(let i=0;i<=10;i++) order.push(i);
            for(let i=11;i<=19;i++) order.push(i);
            for(let i=20;i<=30;i++) order.push(i);
            for(let i=31;i<=39;i++) order.push(i);
            
            order.forEach(pos => {
                const cell = currentGame.board[pos];
                const div = document.createElement('div');
                div.className = `board-cell`;
                if(cell.color!=='special') {
                    const strip = document.createElement('div');
                    strip.className = `color-strip ${cell.color}`;
                    div.appendChild(strip);
                }
                const nameSpan = document.createElement('div');
                nameSpan.className = 'cell-name';
                nameSpan.textContent = cell.name.substring(0,8);
                div.appendChild(nameSpan);
                
                if(cell.price>0) {
                    const priceSpan = document.createElement('div');
                    priceSpan.className = 'cell-price';
                    priceSpan.textContent = cell.price;
                    div.appendChild(priceSpan);
                }
                
                if(cell.houses>0 || cell.hotel) {
                    const bDiv = document.createElement('div');
                    bDiv.className = 'buildings';
                    if(cell.hotel) {
                        const hot = document.createElement('div');
                        hot.className = 'building hotel';
                        bDiv.appendChild(hot);
                    } else {
                        for(let i=0; i<cell.houses; i++) {
                            const h = document.createElement('div');
                            h.className = 'building house';
                            bDiv.appendChild(h);
                        }
                    }
                    div.appendChild(bDiv);
                }
                
                const playersHere = currentGame.players.filter(p=>p.pos===pos && p.alive);
                if(playersHere.length) {
                    const tokensDiv = document.createElement('div');
                    tokensDiv.className = 'player-tokens';
                    playersHere.forEach(p=>{
                        const tok = document.createElement('div');
                        tok.className = 'token';
                        tok.style.backgroundColor = p.color;
                        tok.textContent = charEmojis[p.character];
                        tok.title = p.name;
                        tokensDiv.appendChild(tok);
                    });
                    div.appendChild(tokensDiv);
                }
                
                div.onclick = ()=> onCellClick(pos);
                board.appendChild(div);
            });
        }

        function onCellClick(pos) {
            const cell = currentGame.board[pos];
            let msg = `${cell.name}\n`;
            if(cell.owner) {
                const owner = currentGame.players.find(p=>p.id===cell.owner);
                msg += `Владелец: ${owner.name}\nАренда: ${cell.rent[cell.houses||0]}`;
            } else if(cell.price>0) msg += `Цена: ${cell.price}💰\nАренда: ${cell.rent[0]}`;
            showNotif(msg,'info');
        }

        // ==================== БРОСОК КУБИКОВ ====================
        function rollDice() {
            if(!currentGame.started) return showNotif('Игра не начата','error');
            if(currentPlayer.id!==currentGame.turn) return showNotif('Не ваш ход','error');
            if(currentGame.diceRolled) return showNotif('Вы уже бросили','error');
            
            const d1 = Math.floor(Math.random()*6)+1;
            const d2 = Math.floor(Math.random()*6)+1;
            document.getElementById('dice1').textContent = ['⚀','⚁','⚂','⚃','⚄','⚅'][d1-1];
            document.getElementById('dice2').textContent = ['⚀','⚁','⚂','⚃','⚄','⚅'][d2-1];
            
            const player = getCurrentPlayer();
            if(player.inJail) {
                if(d1===d2) {
                    player.inJail=false; player.jailTurns=0;
                    addChat('system',`${player.name} вышел из тюрьмы!`);
                } else {
                    player.jailTurns++;
                    if(player.jailTurns>=3) {
                        player.money-=50; player.inJail=false; player.jailTurns=0;
                        addChat('system',`${player.name} заплатил 50 и вышел`);
                    } else { nextTurn(); return; }
                }
            }
            
            // АНИМАЦИЯ ДВИЖЕНИЯ
            let steps = d1+d2;
            const moveInterval = setInterval(()=>{
                if(steps===0) { clearInterval(moveInterval); afterMove(d1===d2); return; }
                player.pos = (player.pos+1)%40;
                renderBoard();
                steps--;
            }, 200);
            
            function afterMove(isDouble) {
                if(player.pos < (player.pos-steps+40)%40) { player.money+=200; addChat('system',`${player.name} +200 за Старт`); }
                const land = currentGame.board[player.pos];
                if(land.pos===30) { player.inJail=true; player.pos=10; addChat('system',`${player.name} в тюрьму`); }
                else if(land.name==='ШАНС') drawChance(player);
                else if(land.name==='КАЗНА') drawChest(player);
                else if(land.price>0 && !land.owner) { selectedCell=player.pos; showPropModal(land); }
                else if(land.owner && land.owner!==player.id) payRent(player, land);
                
                currentGame.diceRolled = true;
                if(!isDouble) nextTurn(); else showNotif('ДУБЛЬ! Ещё ход','warning');
                renderBoard(); updatePlayers(); saveGame();
            }
        }

        function payRent(player, prop) {
            let rent = prop.rent[prop.houses||0];
            if(prop.color==='railroad') {
                const owner = getPlayerById(prop.owner);
                const cnt = owner.props.filter(p=>currentGame.board[p].color==='railroad').length;
                rent = [25,50,100,200][cnt-1];
            } else if(prop.color==='utility') {
                const dice = Math.floor(Math.random()*6)+1 + Math.floor(Math.random()*6)+1;
                const owner = getPlayerById(prop.owner);
                const cnt = owner.props.filter(p=>currentGame.board[p].color==='utility').length;
                rent = cnt===1 ? dice*4 : dice*10;
            }
            if(player.money>=rent) {
                player.money-=rent;
                getPlayerById(prop.owner).money+=rent;
                addChat('system',`${player.name} заплатил ${rent}💰 ${getPlayerById(prop.owner).name}`);
            } else bankrupt(player, prop.owner);
        }

        function drawChance(player) {
            const card = chanceCards[Math.floor(Math.random()*chanceCards.length)];
            if(card.money) player.money+=card.money;
            if(card.jail) { player.inJail=true; player.pos=10; }
            if(card.pos!==undefined) player.pos=card.pos;
            if(card.jailCard) player.jailCards++;
            addChat('system',`${player.name}: ШАНС — ${card.text}`);
        }
        function drawChest(player) {
            const card = chestCards[Math.floor(Math.random()*chestCards.length)];
            if(card.money) player.money+=card.money;
            if(card.pos!==undefined) player.pos=card.pos;
            addChat('system',`${player.name}: КАЗНА — ${card.text}`);
        }

        function bankrupt(player, newOwnerId) {
            player.alive=false;
            if(newOwnerId) {
                const newO = getPlayerById(newOwnerId);
                player.props.forEach(p=>{ currentGame.board[p].owner=newOwnerId; newO.props.push(p); });
                addChat('system',`${player.name} банкрот! Всё переходит ${newO.name}`);
            }
            player.props=[];
            if(currentGame.players.filter(p=>p.alive).length===1) {
                const winner = currentGame.players.find(p=>p.alive);
                addChat('system',`🏆🏆🏆 ${winner.name} ПОБЕДИЛ! 🏆🏆🏆`);
                currentGame.started=false;
            }
        }

        function placeBid() {
            if(!currentAuction) return;
            const amount = parseInt(document.getElementById('bid-amount').value);
            if(amount<10 || amount<=currentAuction.bid) return showNotif('Ставка должна быть больше текущей','error');
            if(amount>currentPlayer.money) return showNotif('Не хватает денег','error');
            
            currentAuction.bid = amount;
            currentAuction.leader = currentPlayer.id;
            currentAuction.timer = 5;
            currentAuction.active = true;
            document.getElementById('current-bid').textContent = amount;
            document.getElementById('bid-leader').textContent = currentPlayer.name;
            
            if(currentAuction.interval) clearInterval(currentAuction.interval);
            currentAuction.interval = setInterval(()=>{
                currentAuction.timer--;
                document.getElementById('auction-timer').textContent = currentAuction.timer;
                if(currentAuction.timer<=0) {
                    clearInterval(currentAuction.interval);
                    endAuction();
                }
            },1000);
        }

        function endAuction() {
            if(!currentAuction) return;
            if(currentAuction.leader) {
                const winner = getPlayerById(currentAuction.leader);
                winner.money -= currentAuction.bid;
                currentAuction.prop.owner = winner.id;
                winner.props.push(selectedCell);
                addChat('system',`🏆 ${winner.name} выиграл аукцион за ${currentAuction.bid}💰`);
            } else addChat('system',`❌ Аукцион отменён`);
            currentAuction=null;
            closeModal('auction-modal');
            renderBoard(); updatePlayers(); saveGame();
        }

        // ==================== ХОДЫ ====================
        function nextTurn() {
            const alive = currentGame.players.filter(p=>p.alive);
            let idx = alive.findIndex(p=>p.id===currentGame.turn);
            idx = (idx+1)%alive.length;
            currentGame.turn = alive[idx].id;
            currentGame.diceRolled = false;
            updateTurnIndicator();
            if(currentPlayer.id===currentGame.turn) showNotif('🎲 ВАШ ХОД!','warning');
            saveGame();

        function endTurn() {
            if(currentPlayer.id!==currentGame.turn) return showNotif('Не ваш ход','error');
            nextTurn();
        }

        function updateTurnIndicator() {
            const ind = document.getElementById('turn-indicator');
            if(!currentGame.started) ind.textContent='⏳ Ожидание...';

                const p = getPlayerById(currentGame.turn);
                ind.textContent = `🎲 Ходит: ${p.name}`;
            }

        // ==================== СТРОИТЕЛЬСТВО ====================
        function buildHouse() {
            if(currentPlayer.id!==currentGame.turn) return showNotif('Не ваш ход','error');
            const player = getCurrentPlayer();
            const groups = {};
            player.props.forEach(pos=>{
                const p=currentGame.board[pos];
                if(p.color!=='railroad' && p.color!=='utility') {
                    if(!groups[p.color]) groups[p.color]=[];
                    groups[p.color].push(p);
                }
            });
            let buildable = null;
            for(let g in groups) {
                const size = {brown:2,lightblue:3,pink:3,orange:3,red:3,yellow:3,green:3,blue:2}[g];
                if(groups[g].length===size) {
                    const one = groups[g].find(p=>!p.hotel && (p.houses||0)<4);
                    if(one) { buildable=one; break; }
                }
            }
            if(!buildable) return showNotif('Нет доступных для строительства','error');
            if(player.money>=buildable.housePrice) {
                player.money-=buildable.housePrice;
                buildable.houses = (buildable.houses||0)+1;
                addChat('system',`${player.name} построил дом на ${buildable.name}`);
                renderBoard(); updatePlayers(); saveGame();
            } else showNotif('Не хватает денег','error');
        }

        function buildHotel() {
            if(currentPlayer.id!==currentGame.turn) return showNotif('Не ваш ход','error');
            const player = getCurrentPlayer();
            const hotelable = player.props.find(pos=>{
                const p=currentGame.board[pos];
                return p.houses===4 && !p.hotel;
            });
            if(!hotelable) return showNotif('Нет улиц с 4 домами','error');
            const prop = currentGame.board[hotelable];
            if(player.money>=prop.housePrice) {
                player.money-=prop.housePrice;
                prop.hotel=true; prop.houses=0;
                addChat('system',`${player.name} построил отель на ${prop.name}`);
                renderBoard(); updatePlayers(); saveGame();
            } else showNotif('Не хватает денег','error');
        }

        }

        function showTradeWindow() {
            const target = getPlayerById(tradeTarget);
            const me = getCurrentPlayer();
            let html = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;">`;
            html += `<div><h3>${charEmojis[me.character]} ${me.name}</h3>`;
            me.props.forEach(pos=>{
                const p = currentGame.board[pos];
                const sel = selectedMyProps.includes(pos)?'style="background:#d1fae5;"':'';
                html += `<div class="property-item" ${sel} onclick="toggleMyProp(${pos})">${p.name} (${p.price})</div>`;
            });
            html += `<p>💵 <input type="number" id="my-money-offer" min="0" max="${me.money}" value="0" onchange="myMoneyOffer=+this.value"></p>`;
            html += `</div><div><h3>${charEmojis[target.character]} ${target.name}</h3>`;
            target.props.forEach(pos=>{
                const p = currentGame.board[pos];
                const sel = selectedHisProps.includes(pos)?'style="background:#d1fae5;"':'';
                html += `<div class="property-item" ${sel} onclick="toggleHisProp(${pos})">${p.name} (${p.price})</div>`;
            });
            html += `<p>💵 <input type="number" id="his-money-offer" min="0" max="${target.money}" value="0" onchange="hisMoneyOffer=+this.value"></p>`;
            html += `</div></div><button class="btn primary" onclick="proposeTrade()" style="margin-top:20px;">💌 ПРЕДЛОЖИТЬ</button>`;
            document.getElementById('trade-content').innerHTML = html;
        }

        function toggleMyProp(pos) {
            const idx = selectedMyProps.indexOf(pos);
            if(idx===-1) selectedMyProps.push(pos); else selectedMyProps.splice(idx,1);
            showTradeWindow();
        }
        function toggleHisProp(pos) {
            const idx = selectedHisProps.indexOf(pos);
            if(idx===-1) selectedHisProps.push(pos); else selectedHisProps.splice(idx,1);
            showTradeWindow();
        }

        function proposeTrade() {
            const target = getPlayerById(tradeTarget);
            // В реальной игре здесь нужно отправить предложение и ждать ответа.
            // Для демо просто совершим обмен мгновенно.
            const me = getCurrentPlayer();
            // Проверка денег
            if(myMoneyOffer>me.money || hisMoneyOffer>target.money) return showNotif('Недостаточно денег','error');
            // Передача денег
            me.money -= myMoneyOffer;
            target.money += myMoneyOffer;
            target.money -= hisMoneyOffer;
            me.money += hisMoneyOffer;
            // Передача свойств
            selectedMyProps.forEach(pos=>{
                currentGame.board[pos].owner = target.id;
                target.props.push(pos);
                me.props = me.props.filter(p=>p!==pos);
            });
            selectedHisProps.forEach(pos=>{
                currentGame.board[pos].owner = me.id;
                me.props.push(pos);
                target.props = target.props.filter(p=>p!==pos);
            });
            addChat('system',`🤝 Обмен между ${me.name} и ${target.name} совершён`);
            closeModal('trade-modal');
            renderBoard(); updatePlayers(); saveGame();
        }

        // ==================== МОИ КАРТЫ ====================
        function showMyCards() {
            const me = getCurrentPlayer();
            if(!me.props.length) return showNotif('У вас нет собственности','info');
            let msg = '🏠 ВАША СОБСТВЕННОСТЬ:\n';
            me.props.forEach(pos=>{
                const p = currentGame.board[pos];
                msg += `${p.name} — ${p.price}💰`;
                if(p.houses) msg += ` (${p.houses}🏠)`;
                if(p.hotel) msg += ` (🏨)`;
                msg += `\n`;
            });
            showNotif(msg,'info');
        }

        // ==================== ЧАТ ====================
        function sendChat() {
            const inp = document.getElementById('chat-input');
            if(!inp.value.trim()) return;
            addChat(currentPlayer.name, inp.value);
            inp.value='';
        }

        function addChat(sender, text) {
            if(!currentGame) return;
            currentGame.chats.push({sender, text, time:new Date().toLocaleTimeString()});
            if(currentGame.chats.length>50) currentGame.chats.shift();
            renderChat();
        }

        function renderChat() {
            const cont = document.getElementById('chat-messages');
            if(!cont || !currentGame) return;
            cont.innerHTML = currentGame.chats.map(c=> 
                `<div class="chat-message"><span class="chat-sender">${c.sender}:</span> ${c.text} <span style="float:right;color:var(--gray);font-size:0.7em;">${c.time}</span></div>`
            ).join('');
            cont.scrollTop = cont.scrollHeight;
        }

        // ==================== СПИСОК ИГР ====================
        function showGamesList() {
            games = JSON.parse(localStorage.getItem('monopolyGames')||'{}');
            const cont = document.getElementById('games-container');
            const listDiv = document.getElementById('games-list');
            const available = Object.values(games).filter(g=>!g.started && g.players.length<6);
            if(!available.length) cont.innerHTML = '<p>Нет доступных игр</p>';
            else {
                cont.innerHTML = available.map(g=>{
                    const taken = g.players.map(p=>p.character);
                    const charFree = !taken.includes(selectedCharacter);
                    return `<div class="game-item">
                        <div class="game-item-code">🔑 ${g.id}</div>
                        <div>👑 Создатель: ${g.creatorName}</div>
                        <div>👥 Игроки: ${g.players.length}/6</div>
                        <div>🎭 Фигурки: ${g.players.map(p=>charEmojis[p.character]).join(' ')}</div>
                        <div class="game-item-join"><button class="btn small ${charFree?'primary':'secondary'}" onclick="joinGame('${g.id}')" ${!charFree?'disabled':''}>${charFree?'✅ Присоединиться':'❌ Фигурка занята'}</button></div>
                    </div>`;
                }).join('');
            }
            listDiv.style.display='block';
        }

        // ==================== ОБНОВЛЕНИЕ ИГРОКОВ ====================
        function updatePlayers() {
            if(!currentGame) return;
            const list = document.getElementById('players-list');
            document.getElementById('player-count').textContent = currentGame.players.length;
            list.innerHTML = currentGame.players.map(p=>`
                <div class="player-card ${p.id===currentGame.turn?'current-turn':''}">
                    <div class="player-avatar" style="background:${p.color}">${charEmojis[p.character]}</div>
                    <div class="player-info">
                        <div class="player-name">${p.name} ${p.inJail?'🚓':''}</div>
                        <div class="player-money">💰 ${p.money}</div>
                        <div>🏠 ${p.props.length}</div>
                    </div>
                </div>
            `).join('');
        }

        // ==================== ВСПОМОГАТЕЛЬНЫЕ ====================
        function getCurrentPlayer() { return currentGame.players.find(p=>p.id===currentPlayer.id); }
        function getPlayerById(id) { return currentGame.players.find(p=>p.id===id); }
        function showPropModal(prop) {
            document.getElementById('prop-name').textContent = prop.name;
            let det = `<p>💰 Цена: ${prop.price}</p><p>🏠 Базовая рента: ${prop.rent[0]}</p>`;
            if(prop.housePrice) det += `<p>🏗️ Дом: ${prop.housePrice}</p>`;
            document.getElementById('prop-details').innerHTML = det;
            openModal('property-modal');
        }
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function showNotif(msg, type='info') {
            const n = document.createElement('div');
            n.className = `notification ${type}`;
            n.textContent = msg;
            document.body.appendChild(n);
            setTimeout(()=>n.remove(),3000);
        }
        function saveGame() { if(currentGame) { games[currentGame.id]=currentGame; localStorage.setItem('monopolyGames',JSON.stringify(games)); } }
        function leaveGame() { if(confirm('Выйти?')) { document.getElementById('login-screen').style.display='flex'; document.getElementById('game-screen').style.display='none'; currentGame=null; currentPlayer=null; } }

        window.onload = ()=>{
            games = JSON.parse(localStorage.getItem('monopolyGames')||'{}');
            selectChar('dino');
        };
    </script>
</body>
</html>
