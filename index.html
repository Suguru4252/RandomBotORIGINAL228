<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎲 МОНОПОЛИЯ - ТРЕЙДИНГ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark: #1f2937;
            --light: #f9fafb;
            --gray: #9ca3af;
            
            --brown: #8B4513;
            --lightblue: #7ec8e0;
            --pink: #ed7fb5;
            --orange: #faa634;
            --red: #e64848;
            --yellow: #f5d742;
            --green: #5aa45a;
            --blue: #3f6ba5;
            --railroad: #4b5563;
            --utility: #b1c800;
            
            --board-size: min(700px, 65vw);
        }

        body {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #game-container {
            width: 100%;
            max-width: 1600px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            border-radius: 48px;
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.2);
            animation: containerGlow 3s infinite;
        }

        @keyframes containerGlow {
            0% { box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.2); }
            50% { box-shadow: 0 25px 50px -12px rgba(99,102,241,0.5), inset 0 0 10px 2px rgba(255,255,255,0.5); }
            100% { box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.2); }
        }

        /* ЭКРАН ВХОДА */
        #login-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }

        .login-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 48px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3), inset 0 0 0 1px rgba(255,255,255,0.5);
            width: 100%;
            max-width: 550px;
            text-align: center;
            animation: cardFloat 3s infinite ease-in-out;
            transform-origin: center;
        }

        @keyframes cardFloat {
            0% { transform: translateY(0px) rotate(0deg); }
            25% { transform: translateY(-5px) rotate(0.5deg); }
            75% { transform: translateY(5px) rotate(-0.5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .game-title {
            font-size: 4em;
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--warning));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            animation: titlePulse 2s infinite;
        }

        @keyframes titlePulse {
            0% { filter: drop-shadow(0 0 5px rgba(99,102,241,0.5)); }
            50% { filter: drop-shadow(0 0 20px rgba(236,72,153,0.8)); }
            100% { filter: drop-shadow(0 0 5px rgba(99,102,241,0.5)); }
        }

        .character-option {
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .character-option:hover {
            transform: scale(1.1) rotate(5deg);
        }

        .character-option.selected {
            animation: selectedPulse 1s infinite;
        }

        @keyframes selectedPulse {
            0% { box-shadow: 0 0 0 0 var(--success); }
            50% { box-shadow: 0 0 0 10px rgba(16,185,129,0.2); }
            100% { box-shadow: 0 0 0 0 var(--success); }
        }

        .btn {
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:active::after {
            width: 300px;
            height: 300px;
        }

        /* ЭКРАН ЛОББИ */
        #lobby-screen {
            display: none;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 30px;
            animation: lobbyAppear 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes lobbyAppear {
            0% { transform: scale(0.8) rotate(-2deg); opacity: 0; }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }

        .lobby-player-card {
            animation: playerCardAppear 0.3s ease-out;
            transition: all 0.3s;
        }

        .lobby-player-card:hover {
            transform: translateX(10px) scale(1.05);
            box-shadow: 0 10px 25px -5px var(--primary);
        }

        @keyframes playerCardAppear {
            0% { transform: translateX(-50px); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }

        /* ЭКРАН ИГРЫ */
        #game-screen {
            display: none;
            animation: gameAppear 0.5s ease-out;
        }

        @keyframes gameAppear {
            0% { transform: translateY(50px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .game-header {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 15px 30px;
            margin-bottom: 20px;
            animation: headerGlow 2s infinite;
        }

        @keyframes headerGlow {
            0% { box-shadow: 0 0 20px rgba(99,102,241,0.3); }
            50% { box-shadow: 0 0 40px rgba(236,72,153,0.3); }
            100% { box-shadow: 0 0 20px rgba(99,102,241,0.3); }
        }

        .turn-indicator {
            animation: turnPulse 1s infinite;
        }

        @keyframes turnPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* ПОЛЕ */
        .monopoly-board {
            animation: boardSpin 20s infinite linear;
        }

        @keyframes boardSpin {
            0% { box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5), 0 0 0 4px #1e293b; }
            50% { box-shadow: 0 25px 50px -12px rgba(99,102,241,0.5), 0 0 0 4px var(--primary); }
            100% { box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5), 0 0 0 4px #1e293b; }
        }

        .board-cell {
            transition: all 0.2s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .board-cell:hover {
            transform: scale(1.1) rotate(1deg);
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .token {
            animation: tokenBounce 1s infinite;
            transition: all 0.3s;
        }

        @keyframes tokenBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        .dice {
            transition: all 0.2s;
            animation: diceIdle 2s infinite;
        }

        @keyframes diceIdle {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(5deg); }
            75% { transform: rotate(-5deg); }
            100% { transform: rotate(0deg); }
        }

        .dice.rolling {
            animation: diceRoll 0.2s infinite;
        }

        @keyframes diceRoll {
            0% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(90deg) scale(1.2); }
            50% { transform: rotate(180deg) scale(1); }
            75% { transform: rotate(270deg) scale(1.2); }
            100% { transform: rotate(360deg) scale(1); }
        }

        /* МОДАЛКИ */
        .modal-content {
            animation: modalPop 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.5);
        }

        @keyframes modalPop {
            0% { transform: scale(0.5) rotate(-10deg); opacity: 0; }
            70% { transform: scale(1.05) rotate(2deg); }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }

        /* ТРЕЙД ОКНО */
        .trade-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 20px 0;
        }

        .trade-column {
            background: linear-gradient(145deg, #f3f4f6, #ffffff);
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            animation: columnAppear 0.3s ease-out;
        }

        @keyframes columnAppear {
            0% { transform: translateY(20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .trade-column h3 {
            color: var(--primary);
            margin-bottom: 15px;
            font-size: 1.5em;
            animation: textGlow 2s infinite;
        }

        @keyframes textGlow {
            0% { text-shadow: 0 0 5px var(--primary); }
            50% { text-shadow: 0 0 20px var(--secondary); }
            100% { text-shadow: 0 0 5px var(--primary); }
        }

        .property-item {
            padding: 12px;
            margin: 8px 0;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
            animation: propertyAppear 0.2s ease-out;
        }

        @keyframes propertyAppear {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .property-item:hover {
            transform: translateX(10px) scale(1.02);
            border-color: var(--primary);
            box-shadow: 0 5px 15px rgba(99,102,241,0.3);
        }

        .property-item.selected {
            background: #d1fae5;
            border-color: var(--success);
            animation: selectedItem 1s infinite;
        }

        @keyframes selectedItem {
            0% { box-shadow: 0 0 0 0 var(--success); }
            50% { box-shadow: 0 0 0 5px rgba(16,185,129,0.2); }
            100% { box-shadow: 0 0 0 0 var(--success); }
        }

        .add-button {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            font-size: 2em;
            cursor: pointer;
            margin: 10px 0;
            animation: buttonPulse 2s infinite;
            transition: all 0.3s;
        }

        .add-button:hover {
            transform: scale(1.2) rotate(90deg);
        }

        .add-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            animation: none;
        }

        @keyframes buttonPulse {
            0% { box-shadow: 0 0 0 0 var(--primary); }
            70% { box-shadow: 0 0 0 10px rgba(99,102,241,0); }
            100% { box-shadow: 0 0 0 0 var(--primary); }
        }

        .money-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 30px;
            font-size: 1.1em;
            margin: 10px 0;
            transition: all 0.3s;
        }

        .money-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99,102,241,0.2);
            transform: scale(1.02);
        }

        .trade-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .trade-buttons button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            animation: buttonSlide 0.3s ease-out;
        }

        @keyframes buttonSlide {
            0% { transform: translateX(-20px); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }

        .trade-buttons button.accept {
            background: linear-gradient(135deg, var(--success), #059669);
            color: white;
        }

        .trade-buttons button.accept:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px -5px var(--success);
        }

        .trade-buttons button.decline {
            background: linear-gradient(135deg, var(--danger), #dc2626);
            color: white;
        }

        .trade-buttons button.decline:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px -5px var(--danger);
        }

        .trade-notification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 60px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            z-index: 2000;
            animation: notificationPop 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border: 1px solid rgba(255,255,255,0.5);
            min-width: 400px;
        }

        @keyframes notificationPop {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .notification {
            animation: notificationSlide 0.3s ease-out;
        }

        @keyframes notificationSlide {
            0% { transform: translateX(100%) rotate(10deg); opacity: 0; }
            100% { transform: translateX(0) rotate(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- ЭКРАН ВХОДА -->
        <div id="login-screen">
            <div class="login-card">
                <h1 class="game-title">🎲 МОНОПОЛИЯ</h1>
                <h2 style="color: var(--gray); margin-bottom: 20px;">ТРЕЙДИНГ ЭДИШН</h2>
                
                <div class="input-group">
                    <label>👤 ВАШЕ ИМЯ</label>
                    <input type="text" id="player-name" placeholder="Введите имя" maxlength="15">
                </div>
                
                <div class="character-selector">
                    <h3>🎭 ВЫБЕРИТЕ ФИГУРКУ</h3>
                    <div class="character-grid">
                        <div class="character-option selected" data-char="dino" onclick="selectChar('dino')"><div class="emoji">🦖</div><div>Динозавр</div></div>
                        <div class="character-option" data-char="duck" onclick="selectChar('duck')"><div class="emoji">🦆</div><div>Утка</div></div>
                        <div class="character-option" data-char="car" onclick="selectChar('car')"><div class="emoji">🚗</div><div>Машина</div></div>
                        <div class="character-option" data-char="hat" onclick="selectChar('hat')"><div class="emoji">🧢</div><div>Шапка</div></div>
                        <div class="character-option" data-char="ship" onclick="selectChar('ship')"><div class="emoji">⛵</div><div>Корабль</div></div>
                        <div class="character-option" data-char="dog" onclick="selectChar('dog')"><div class="emoji">🐕</div><div>Пёс</div></div>
                        <div class="character-option" data-char="cat" onclick="selectChar('cat')"><div class="emoji">🐱</div><div>Кот</div></div>
                        <div class="character-option" data-char="penguin" onclick="selectChar('penguin')"><div class="emoji">🐧</div><div>Пингвин</div></div>
                    </div>
                </div>
                
                <button class="btn primary" onclick="createLobby()">✨ СОЗДАТЬ ЛОББИ</button>
                <button class="btn secondary" onclick="showLobbies()">📋 СПИСОК ЛОББИ</button>
                
                <div id="lobbies-list" style="margin-top: 20px; display: none;">
                    <h3>📋 ДОСТУПНЫЕ ЛОББИ:</h3>
                    <div id="lobbies-container"></div>
                </div>
            </div>
        </div>

        <!-- ЭКРАН ЛОББИ -->
        <div id="lobby-screen">
            <div class="lobby-header">
                <span class="lobby-code" id="lobby-code-display">🔑 ----</span>
                <button class="btn small danger" onclick="leaveLobby()">🚪 ПОКИНУТЬ</button>
            </div>

            <h2>👥 ИГРОКИ В ЛОББИ:</h2>
            <div id="lobby-players" class="players-grid"></div>

            <div class="lobby-chat">
                <h3>💬 ЧАТ ЛОББИ</h3>
                <div class="lobby-chat-messages" id="lobby-chat-messages"></div>
                <div class="lobby-chat-input">
                    <input type="text" id="lobby-chat-input" placeholder="Введите сообщение...">
                    <button class="btn primary" onclick="sendLobbyChat()">➤</button>
                </div>
            </div>

            <button class="start-game-btn" id="start-game-btn" onclick="startGame()">▶ НАЧАТЬ ИГРУ</button>
        </div>

        <!-- ЭКРАН ИГРЫ -->
        <div id="game-screen">
            <div class="game-header">
                <span class="lobby-code" id="game-code-display">🔑 ----</span>
                <span class="turn-indicator" id="turn-indicator">⏳ ОЖИДАНИЕ...</span>
                <button class="btn small" onclick="leaveGame()">🚪 ВЫЙТИ</button>
            </div>

            <div style="display: flex; gap: 20px;">
                <div>
                    <div class="monopoly-board" id="board"></div>
                    
                    <div class="dice-area">
                        <div class="dice-container">
                            <div class="dice" id="dice1">⚀</div>
                            <div class="dice" id="dice2">⚀</div>
                        </div>
                        <button class="btn primary" id="roll-dice" onclick="rollDice()" style="width: 250px;">🎲 БРОСИТЬ КОСТИ</button>
                    </div>
                </div>

                <div class="sidebar">
                    <div class="players-panel">
                        <h3>👥 ИГРОКИ</h3>
                        <div id="players-list"></div>
                    </div>

                    <div class="chat-panel">
                        <h3>💬 ЧАТ ИГРЫ</h3>
                        <div class="lobby-chat-messages" id="game-chat-messages"></div>
                        <div class="lobby-chat-input">
                            <input type="text" id="game-chat-input" placeholder="Введите сообщение...">
                            <button class="btn primary" onclick="sendGameChat()">➤</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="game-footer">
                <div class="action-buttons">
                    <button class="btn action" onclick="showMyCards()">🏠 МОИ УЛИЦЫ</button>
                    <button class="btn action" onclick="openTradeModal()">🔄 ТРЕЙД</button>
                    <button class="btn action" onclick="buildHouse()">🏗️ ДОМ</button>
                    <button class="btn action" onclick="buildHotel()">🏨 ОТЕЛЬ</button>
                    <button class="btn action" onclick="endTurn()">⏭️ ЗАВЕРШИТЬ ХОД</button>
                </div>
            </div>
        </div>
    </div>

    <!-- МОДАЛКИ -->
    <div class="modal" id="property-modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('property-modal')">&times;</span>
            <h2 id="prop-name"></h2>
            <div id="prop-details"></div>
            <div style="display: flex; gap: 10px;">
                <button class="btn primary" onclick="buyProperty()">💰 КУПИТЬ</button>
                <button class="btn secondary" onclick="openAuctionModal()">🏷️ АУКЦИОН</button>
            </div>
        </div>
    </div>

    <div class="modal" id="auction-modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('auction-modal')">&times;</span>
            <h2>🏷️ АУКЦИОН</h2>
            <div id="auction-info"></div>
            <input type="number" id="bid-amount" placeholder="Ваша ставка (мин 10)" min="10" style="width: 100%; padding: 15px; margin: 15px 0; border-radius: 40px;">
            <button class="btn primary" onclick="placeBid()">СДЕЛАТЬ СТАВКУ</button>
        </div>
    </div>

    <!-- МОДАЛКА ТРЕЙДА -->
    <div class="modal" id="trade-modal">
        <div class="modal-content">
            <span class="close" onclick="closeTradeModal()">&times;</span>
            <h2 id="trade-modal-title">🔄 ОБМЕН</h2>
            <div id="trade-content"></div>
        </div>
    </div>

    <!-- МОДАЛКА ВЫБОРА КАРТ -->
    <div class="modal" id="select-property-modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('select-property-modal')">&times;</span>
            <h2 id="select-prop-title">🏠 ВЫБЕРИТЕ УЛИЦУ</h2>
            <div id="select-prop-list" style="max-height: 400px; overflow-y: auto;"></div>
        </div>
    </div>

    <script>
        // ==================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ====================
        let games = {};
        let currentGame = null;
        let currentPlayer = null;
        let selectedCharacter = 'dino';
        let selectedCell = null;
        let currentAuction = null;
        let auctionTimer = null;
        let updateInterval = null;
        let lobbyCleanupInterval = null;

        // Трейд переменные
        let currentTrade = null;
        let tradeProposal = null;
        let selectingFor = null;

        const charEmojis = {
            'dino': '🦖', 'duck': '🦆', 'car': '🚗', 'hat': '🧢',
            'ship': '⛵', 'dog': '🐕', 'cat': '🐱', 'penguin': '🐧'
        };

        const playerColors = [
            '#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', 
            '#FFEEAD', '#D4A5A5', '#9B59B6', '#3498DB'
        ];

        // ==================== ДАННЫЕ ПОЛЯ ====================
        const boardData = [
            { pos:0, name:"СТАРТ", price:0, color:"special" },
            { pos:1, name:"УЛ.ПОБЕДЫ", price:60, color:"brown", rent:[2,10,30,90,160,250], housePrice:50 },
            { pos:2, name:"КАЗНА", type:"chest", color:"special" },
            { pos:3, name:"ПР.МИРА", price:60, color:"brown", rent:[4,20,60,180,320,450], housePrice:50 },

        // ==================== ТАЙМЕР УДАЛЕНИЯ ЛОББИ ====================
        function startLobbyCleanup() {
            if (lobbyCleanupInterval) clearInterval(lobbyCleanupInterval);
            
            lobbyCleanupInterval = setInterval(() => {
                const games = JSON.parse(localStorage.getItem('monopolyGames') || '{}');
                let changed = false;
                const now = Date.now();
                
                Object.keys(games).forEach(gameId => {
                    const game = games[gameId];
                    
                    if (!game.started && game.createdAt && (now - game.createdAt) > 20 * 60 * 1000) {
                        delete games[gameId];
                        changed = true;
                    }
                    
                    if (game.players && game.players.length === 0) {
                        delete games[gameId];
                        changed = true;
                    }
                });
                
                if (changed) {
                    localStorage.setItem('monopolyGames', JSON.stringify(games));
                    
                    if (currentGame && !games[currentGame.id]) {
                        showNotif('❌ Лобби было удалено (20 минут без старта)', 'error');
                        leaveToMenu();
                    }
                }
            }, 1000);
        }

        // ==================== АВТООБНОВЛЕНИЕ ====================
        function startAutoUpdate() {
            if (updateInterval) clearInterval(updateInterval);
            
            updateInterval = setInterval(() => {
                if (!currentGame || !currentGame.id) return;
                
                const saved = JSON.parse(localStorage.getItem('monopolyGames') || '{}');
                const updatedGame = saved[currentGame.id];
                
                if (!updatedGame) {
                    showNotif('❌ Лобби больше не существует', 'error');
                    leaveToMenu();
                    return;
                }
                
                const stillInGame = updatedGame.players.some(p => p.id === currentPlayer.id);
                if (!stillInGame) {
                    showNotif('❌ Вас кикнули из лобби', 'error');
                    leaveToMenu();
                    return;
                }
                
                if (!currentGame.started && updatedGame.started) {
                    currentGame = updatedGame;
                    enterGame();
                    return;
                }
                
                currentGame = updatedGame;
                
                if (document.getElementById('lobby-screen').style.display === 'block') {
                    updateLobbyUI();
                } else if (document.getElementById('game-screen').style.display === 'block') {
                    renderBoard();
                    updatePlayersList();
                    updateTurnIndicator();
                    renderGameChat();
                }
            }, 300);
        }

        function joinLobby(gameId) {
            const name = document.getElementById('player-name').value.trim();
            if (!name) return showNotif('Введите имя!', 'error');

            const games = JSON.parse(localStorage.getItem('monopolyGames') || '{}');
            const game = games[gameId];
            
            if (!game) return showNotif('Лобби не найдено', 'error');
            if (game.started) return showNotif('Игра уже началась', 'error');
            if (game.players.length >= game.maxPlayers) return showNotif('Лобби заполнено', 'error');
            if (game.players.some(p => p.name === name)) return showNotif('Имя занято', 'error');
            if (game.players.some(p => p.character === selectedCharacter)) return showNotif('Фигурка занята', 'error');

            currentPlayer = {
                id: 'p' + Date.now() + Math.random(),
                name: name,
                character: selectedCharacter,
                color: playerColors[game.players.length],
                isCreator: false,
                money: 1500,
                pos: 0,
                props: [],
                inJail: false,
                jailTurns: 0,
                jailCards: 0,
                alive: true
            };

            game.players.push(currentPlayer);
            
            if (!game.chats) game.chats = [];
            game.chats.push({
                sender: 'system',
                text: `👋 ${name} присоединился к лобби`,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            });
            
            currentGame = game;
            games[gameId] = game;
            localStorage.setItem('monopolyGames', JSON.stringify(games));
            
            enterLobby();
            startAutoUpdate();
        }

        function updateLobbyUI() {
            const container = document.getElementById('lobby-players');
            if (!container) return;
            
            container.innerHTML = currentGame.players.map(player => {
                const isCreator = player.id === currentGame.creator;
                const canKick = currentPlayer.isCreator && player.id !== currentPlayer.id;
                
                return `
                    <div class="lobby-player-card" style="animation-delay: ${Math.random() * 0.5}s">
                        <div class="lobby-player-avatar" style="background: ${player.color}">
                            ${charEmojis[player.character]}
                        </div>
                        <div>
                            <strong>${player.name}</strong>
                            ${isCreator ? ' 👑' : ''}
                        </div>
                        ${canKick ? `<button class="kick-btn" onclick="kickPlayer('${player.id}')">✕</button>` : ''}
                    </div>
                `;
            }).join('');
            
            renderLobbyChat();
            
            const startBtn = document.getElementById('start-game-btn');
            if (currentPlayer.isCreator) {
                startBtn.style.display = 'block';
                if (currentGame.players.length < 2) {
                    startBtn.disabled = true;
                    startBtn.textContent = `⏳ ЖДЕМ ИГРОКОВ (${currentGame.players.length}/2)`;
                } else {
                    startBtn.disabled = false;
                    startBtn.textContent = '▶ НАЧАТЬ ИГРУ';
                }
            } else {
                startBtn.style.display = 'none';
            }

        function kickPlayer(playerId) {
            if (!currentPlayer.isCreator) return;
            
            const kickedPlayer = currentGame.players.find(p => p.id === playerId);
            if (!kickedPlayer) return;
            
            currentGame.players = currentGame.players.filter(p => p.id !== playerId);
            
            currentGame.chats.push({
                sender: 'system',
                text: `👢 ${kickedPlayer.name} был кикнут`,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            });
            
            const games = JSON.parse(localStorage.getItem('monopolyGames') || '{}');
            games[currentGame.id] = currentGame;
            localStorage.setItem('monopolyGames', JSON.stringify(games));
        }

        function leaveLobby() {
            if (!currentGame || !currentPlayer) return;
            
            currentGame.players = currentGame.players.filter(p => p.id !== currentPlayer.id);
            
            const games = JSON.parse(localStorage.getItem('monopolyGames') || '{}');
            
            if (currentPlayer.isCreator || currentGame.players.length === 0) {
                delete games[currentGame.id];
            } else {
                currentGame.chats.push({
                    sender: 'system',
                    text: `🚪 ${currentPlayer.name} покинул лобби`,
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                });
                games[currentGame.id] = currentGame;
            }
            
            localStorage.setItem('monopolyGames', JSON.stringify(games));
            leaveToMenu();
        }

        // ==================== ПОЛЕ ====================
        function renderBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            
            for (let row = 0; row < 11; row++) {
                for (let col = 0; col < 11; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'board-cell';
                    
                    if (row === 0 && col === 0) {
                        cell.innerHTML = '<div class="cell-name">СТАРТ</div>';
                        cell.onclick = () => showCellInfo(0);
                    } 
                    else if (row === 0 && col === 10) {
                        cell.innerHTML = '<div class="cell-name">ТЮРЬМА</div>';
                        cell.onclick = () => showCellInfo(10);
                    }
                    else if (row === 10 && col === 0) {
                        cell.innerHTML = '<div class="cell-name">ПАРКОВКА</div>';
                        cell.onclick = () => showCellInfo(20);
                    }
                    else if (row === 10 && col === 10) {
                        cell.innerHTML = '<div class="cell-name">В ТЮРЬМУ</div>';
                        cell.onclick = () => showCellInfo(30);
                    }
                    else if (row === 0 && col > 0 && col < 10) {
                        addPropertyCell(cell, col);
                    }
                    else if (row === 10 && col > 0 && col < 10) {
                        addPropertyCell(cell, 30 - col);
                    }
                    else if (col === 0 && row > 0 && row < 10) {
                        addPropertyCell(cell, 20 - row);
                    }
                    else if (col === 10 && row > 0 && row < 10) {
                        addPropertyCell(cell, 9 + row);
                    }
                    else if (row >= 2 && row <= 9 && col >= 2 && col <= 9) {
                        if (row === 5 && col === 5) {
                            cell.innerHTML = `
                                <div style="display: flex; gap: 10px;">
                                    <div style="width:60px;height:80px;background:#ffedd5;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:2em;cursor:pointer;transition:all 0.3s;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'" onclick="drawChance()">🎲</div>
                                    <div style="width:60px;height:80px;background:#dbeafe;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:2em;cursor:pointer;transition:all 0.3s;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'" onclick="drawChest()">📦</div>
                                </div>
                            `;
                        } else {
                            cell.style.background = '#e5e7eb';
                        }
                    }
                    
                    const pos = getPosFromCell(row, col);
                    if (pos !== -1) {
                        const playersHere = currentGame.players.filter(p => p.pos === pos && p.alive);
                        if (playersHere.length) {
                            const tokensDiv = document.createElement('div');
                            tokensDiv.className = 'player-tokens';
                            playersHere.forEach(p => {
                                const tok = document.createElement('div');
                                tok.className = 'token';
                                tok.style.backgroundColor = p.color;
                                tok.textContent = charEmojis[p.character];
                                tok.title = p.name;
                                tokensDiv.appendChild(tok);
                            });
                            cell.appendChild(tokensDiv);
                        }
                    }
                    
                    board.appendChild(cell);
                }
            }
        }

        function addPropertyCell(cell, pos) {
            const prop = currentGame.board[pos];
            if (!prop) return;
            
            if (prop.color !== 'special' && prop.color !== 'tax') {
                const strip = document.createElement('div');
                strip.className = `color-strip ${prop.color}`;
                cell.appendChild(strip);
            }
            
            cell.innerHTML += `<div class="cell-name">${prop.name}</div>`;
            if (prop.price) cell.innerHTML += `<div>${prop.price}</div>`;
            
            if (prop.houses > 0 || prop.hotel) {
                const bDiv = document.createElement('div');
                bDiv.className = 'buildings';
                if (prop.hotel) {
                    bDiv.innerHTML = '<div class="building hotel"></div>';
                } else {
                    for (let i = 0; i < prop.houses; i++) {
                        bDiv.innerHTML += '<div class="building house"></div>';
                    }
                }
                cell.appendChild(bDiv);
            }
            
            cell.onclick = () => showCellInfo(pos);
        }

        function getPosFromCell(row, col) {
            if (row === 0 && col === 0) return 0;
            if (row === 0 && col === 10) return 10;
            if (row === 10 && col === 0) return 20;
            if (row === 10 && col === 10) return 30;
            if (row === 0 && col > 0 && col < 10) return col;
            if (row === 10 && col > 0 && col < 10) return 30 - col;
            if (col === 0 && row > 0 && row < 10) return 20 - row;
            if (col === 10 && row > 0 && row < 10) return 9 + row;
            return -1;
        }

        function showCellInfo(pos) {
            if (pos < 0) return;
            const prop = currentGame.board[pos];
            let msg = `${prop.name}\n`;
            if (prop.owner) {
                const owner = currentGame.players.find(p => p.id === prop.owner);
                msg += `Владелец: ${owner.name}\nАренда: ${prop.rent[prop.houses || 0]}`;
            } else if (prop.price > 0) {
                msg += `Цена: ${prop.price}💰\nАренда: ${prop.rent[0]}`;
            }
            showNotif(msg);
        }

        // ==================== ИГРОВАЯ МЕХАНИКА ====================
        function rollDice() {
            if (!currentGame.started) return showNotif('Игра не начата', 'error');
            if (currentPlayer.id !== currentGame.turn) return showNotif('Не ваш ход', 'error');
            if (currentGame.diceRolled) return showNotif('Вы уже бросили', 'error');
            
            document.getElementById('dice1').classList.add('rolling');
            document.getElementById('dice2').classList.add('rolling');
            
            setTimeout(() => {
                const d1 = Math.floor(Math.random() * 6) + 1;
                const d2 = Math.floor(Math.random() * 6) + 1;
                document.getElementById('dice1').textContent = ['⚀','⚁','⚂','⚃','⚄','⚅'][d1-1];
                document.getElementById('dice2').textContent = ['⚀','⚁','⚂','⚃','⚄','⚅'][d2-1];
                document.getElementById('dice1').classList.remove('rolling');
                document.getElementById('dice2').classList.remove('rolling');
                
                const player = getCurrentPlayer();
                const oldPos = player.pos;
                const total = d1 + d2;
                
                player.pos = (player.pos + total) % 40;
                
                if (player.pos < oldPos) {
                    player.money += 200;
                    addGameChat('system', `${player.name} +200 за Старт`);
                }
                
                const land = currentGame.board[player.pos];
                
                if (land.type === 'tax') {
                    if (player.money >= land.price) {
                        player.money -= land.price;
                        currentGame.jackpot += land.price;
                    } else bankrupt(player);
                }
                else if (land.type === 'gotojail') {
                    player.inJail = true;
                    player.pos = 10;
                    addGameChat('system', `${player.name} в тюрьму`);
                }
                else if (land.price > 0 && !land.owner) {
                    selectedCell = player.pos;
                    showPropModal(land);
                }
                else if (land.owner && land.owner !== player.id) {
                    payRent(player, land);
                }
                
                currentGame.diceRolled = true;
                if (d1 !== d2) {
                    nextTurn();
                } else {
                    showNotif('ДУБЛЬ! Ещё ход', 'warning');
                }
                
                const games = JSON.parse(localStorage.getItem('monopolyGames') || '{}');
                games[currentGame.id] = currentGame;
                localStorage.setItem('monopolyGames', JSON.stringify(games));
            }, 300);
        }

        function payRent(player, prop) {
            let rent = prop.rent[prop.houses || 0];
            if (prop.color === 'railroad') {
                const owner = getPlayerById(prop.owner);
                const cnt = owner.props.filter(p => currentGame.board[p].color === 'railroad').length;
                rent = [25, 50, 100, 200][cnt-1];
            }
            if (player.money >= rent) {
                player.money -= rent;
                getPlayerById(prop.owner).money += rent;
                addGameChat('system', `${player.name} заплатил ${rent}💰`);
            } else bankrupt(player, prop.owner);
        }

        function drawChance() {
            if (currentPlayer.id !== currentGame.turn) return showNotif('Не ваш ход', 'error');
            const card = chanceCards[Math.floor(Math.random() * chanceCards.length)];
            applyCard(card);
            addGameChat('system', `${currentPlayer.name}: ШАНС — ${card.text}`);
        }

        function drawChest() {
            if (currentPlayer.id !== currentGame.turn) return showNotif('Не ваш ход', 'error');
            const card = chestCards[Math.floor(Math.random() * chestCards.length)];
            applyCard(card);
            addGameChat('system', `${currentPlayer.name}: КАЗНА — ${card.text}`);
        }

        function applyCard(card) {
            const player = getCurrentPlayer();
            if (card.money) player.money += card.money;
            if (card.jail) { player.inJail = true; player.pos = 10; }
            if (card.pos !== undefined) player.pos = card.pos;
            if (card.jailCard) player.jailCards++;
            
            const games = JSON.parse(localStorage.getItem('monopolyGames') || '{}');
            games[currentGame.id] = currentGame;
            localStorage.setItem('monopolyGames', JSON.stringify(games));
        }

        function buyProperty() {
            if (selectedCell === null) return;
            const player = getCurrentPlayer();
            const prop = currentGame.board[selectedCell];
            if (player.money >= prop.price) {
                player.money -= prop.price;
                prop.owner = player.id;
                player.props.push(selectedCell);
                addGameChat('system', `${player.name} купил ${prop.name}`);
                showNotif(`✅ Куплено!`);
            } else showNotif('❌ Не хватает денег', 'error');
            closeModal('property-modal');
            
            const games = JSON.parse(localStorage.getItem('monopolyGames') || '{}');
            games[currentGame.id] = currentGame;
            localStorage.setItem('monopolyGames', JSON.stringify(games));

            document.getElementById('auction-info').innerHTML = `
                <p>Лот: <strong>${prop.name}</strong></p>

        function placeBid() {
            if (!currentAuction) return;
            const amount = parseInt(document.getElementById('bid-amount').value);
            if (amount < 10 || amount <= currentAuction.bid) return showNotif('Ставка должна быть больше', 'error');
            if (amount > currentPlayer.money) return showNotif('Не хватает денег', 'error');
            
            currentAuction.bid = amount;
            currentAuction.leader = currentPlayer.id;
            currentAuction.timer = 5;
            currentAuction.active = true;
            document.getElementById('current-bid').textContent = amount;
            document.getElementById('bid-leader').textContent = currentPlayer.name;
            
            if (auctionTimer) clearInterval(auctionTimer);
            auctionTimer = setInterval(() => {
                currentAuction.timer--;
                document.getElementById('auction-timer').textContent = currentAuction.timer;
                if (currentAuction.timer <= 0) {
                    clearInterval(auctionTimer);
                    endAuction();
                }
            }, 1000);
        }

        function endAuction() {
            if (!currentAuction) return;
            if (currentAuction.leader) {
                const winner = getPlayerById(currentAuction.leader);
                winner.money -= currentAuction.bid;
                currentAuction.prop.owner = winner.id;
                winner.props.push(selectedCell);
                addGameChat('system', `🏆 ${winner.name} выиграл аукцион за ${currentAuction.bid}💰`);

            currentAuction = null;

            localStorage.setItem('monopolyGames', JSON.stringify(games));

        function buildHouse() {
            if (currentPlayer.id !== currentGame.turn) return showNotif('Не ваш ход', 'error');
            const player = getCurrentPlayer();
            const buildable = player.props.find(pos => {
                const p = currentGame.board[pos];
                return p.housePrice && !p.hotel && (p.houses || 0) < 4 && hasFullGroup(p.color);
            });
            if (!buildable) return showNotif('Нет доступных для стройки', 'error');
            const prop = currentGame.board[buildable];
            if (player.money >= prop.housePrice) {
                player.money -= prop.housePrice;
                prop.houses = (prop.houses || 0) + 1;
                addGameChat('system', `${player.name} построил дом на ${prop.name}`);
                
                const games = JSON.parse(localStorage.getItem('monopolyGames') || '{}');
                games[currentGame.id] = currentGame;
                localStorage.setItem('monopolyGames', JSON.stringify(games));
            }
        }

        function buildHotel() {
            if (currentPlayer.id !== currentGame.turn) return showNotif('Не ваш ход', 'error');
            const player = getCurrentPlayer();
            const hotelable = player.props.find(pos => {
                const p = currentGame.board[pos];
                return p.houses === 4 && !p.hotel;
            });
            if (!hotelable) return showNotif('Нет улиц с 4 домами', 'error');
            const prop = currentGame.board[hotelable];
            if (player.money >= prop.housePrice) {
                player.money -= prop.housePrice;
                prop.hotel = true;
                prop.houses = 0;
                addGameChat('system', `${player.name} построил отель на ${prop.name}`);
                
                const games = JSON.parse(localStorage.getItem('monopolyGames') || '{}');
                games[currentGame.id] = currentGame;
                localStorage.setItem('monopolyGames', JSON.stringify(games));
            }
        }

        function hasFullGroup(color) {
            const player = getCurrentPlayer();
            const groupSizes = { brown:2, lightblue:3, pink:3, orange:3, red:3, yellow:3, green:3, blue:2 };
            const needed = groupSizes[color] || 2;
            const owned = player.props.filter(p => currentGame.board[p].color === color).length;
            return owned >= needed;
        }

        function nextTurn() {
            const alive = currentGame.players.filter(p => p.alive);
            let idx = alive.findIndex(p => p.id === currentGame.turn);
            idx = (idx + 1) % alive.length;
            currentGame.turn = alive[idx].id;
            currentGame.diceRolled = false;
            if (currentPlayer.id === currentGame.turn) showNotif('🎲 ВАШ ХОД!', 'warning');
            
            const games = JSON.parse(localStorage.getItem('monopolyGames') || '{}');
            games[currentGame.id] = currentGame;
            localStorage.setItem('monopolyGames', JSON.stringify(games));
        }

        function endTurn() {
            if (currentPlayer.id !== currentGame.turn) return showNotif('Не ваш ход', 'error');
            nextTurn();
        }

        // ==================== ТРЕЙД СИСТЕМА ====================
        function openTradeModal() {
            const others = currentGame.players.filter(p => p.id !== currentPlayer.id && p.alive);
            if (!others.length) return showNotif('Нет других игроков', 'error');

        function acceptTradeProposal(targetId) {

        function declineTradeProposal(targetId) {

        function openTradeWindow() {

            const player1 = getPlayerById(currentTrade.player1);
            const player2 = getPlayerById(currentTrade.player2);
            const isPlayer1 = currentPlayer.id === currentTrade.player1;
            const isPlayer2 = currentPlayer.id === currentTrade.player2;
            
            if (!isPlayer1 && !isPlayer2) return;

            const hisProps = isPlayer1 ? currentTrade.props2 : currentTrade.props1;

            const hisMoney = isPlayer1 ? currentTrade.money2 : currentTrade.money1;
            
            document.getElementById('trade-modal-title').innerHTML = `🔄 ОБМЕН: ${player1.name} ⇄ ${player2.name}`;

                        <input type="number" class="money-input" id="money1" value="${currentTrade.money1}" min="0" max="${player1.money}" placeholder="Деньги" onchange="updateTradeMoney('player1', this.value)" ${!isPlayer1 ? 'disabled' : ''}>
                    </div>
                    <div class="trade-column">

                        </div>
                        <button class="add-button" onclick="openPropertySelector('player2')" ${!isPlayer2 ? 'disabled' : ''}>+</button>
                        <input type="number" class="money-input" id="money2" value="${currentTrade.money2}" min="0" max="${player2.money}" placeholder="Деньги" onchange="updateTradeMoney('player2', this.value)" ${!isPlayer2 ? 'disabled' : ''}>

                </div>

        function renderPropsList(tradeProps, allProps, playerKey) {
            if (tradeProps.length === 0) return '<p style="color: var(--gray); text-align: center;">Нет выбранных улиц</p>';
            
            return tradeProps.map(pos => {
                const prop = currentGame.board[pos];
                return `<div class="property-item selected" onclick="removeProperty('${playerKey}', ${pos})">${prop.name} (${prop.price}💰)</div>`;
            }).join('');
        }

        function openPropertySelector(playerKey) {
            const isPlayer1 = (playerKey === 'player1' && currentPlayer.id === currentTrade.player1);
            const isPlayer2 = (playerKey === 'player2' && currentPlayer.id === currentTrade.player2);
            
            if (!isPlayer1 && !isPlayer2) {
                showNotif('❌ Вы не можете выбирать имущество другого игрока', 'error');
                return;
            }
            
            const player = getCurrentPlayer();
            const availableProps = player.props.filter(pos => {
                if (playerKey === 'player1') {
                    return !currentTrade.props1.includes(pos);
                } else {
                    return !currentTrade.props2.includes(pos);
                }
            });
            
            if (availableProps.length === 0) {
                showNotif('❌ У вас нет доступных улиц', 'error');
                return;
            }
            
            selectingFor = playerKey;
            document.getElementById('select-prop-title').innerHTML = `🏠 ВЫБЕРИТЕ УЛИЦУ (${player.name})`;
            
            let html = '';
            availableProps.forEach(pos => {
                const prop = currentGame.board[pos];
                html += `<div class="property-item" onclick="selectProperty(${pos})">${prop.name} (${prop.price}💰)</div>`;
            });
            
            document.getElementById('select-prop-list').innerHTML = html;
            openModal('select-property-modal');
        }

        function selectProperty(pos) {
            if (!selectingFor) return;
            
            if (selectingFor === 'player1') {
                currentTrade.props1.push(pos);
                // Убираем из имущества игрока временно
                const player = getPlayerById(currentTrade.player1);
                player.props = player.props.filter(p => p !== pos);
            } else {
                currentTrade.props2.push(pos);
                const player = getPlayerById(currentTrade.player2);
                player.props = player.props.filter(p => p !== pos);
            }
            
            closeModal('select-property-modal');
            
            const games = JSON.parse(localStorage.getItem('monopolyGames') || '{}');
            games[currentGame.id] = currentGame;
            localStorage.setItem('monopolyGames', JSON.stringify(games));
            
            openTradeWindow();
        }

        function removeProperty(playerKey, pos) {
            if (playerKey === 'player1' && currentPlayer.id === currentTrade.player1) {
                currentTrade.props1 = currentTrade.props1.filter(p => p !== pos);
                const player = getPlayerById(currentTrade.player1);
                player.props.push(pos);
            } else if (playerKey === 'player2' && currentPlayer.id === currentTrade.player2) {
                currentTrade.props2 = currentTrade.props2.filter(p => p !== pos);
                const player = getPlayerById(currentTrade.player2);
                player.props.push(pos);
            } else {
                showNotif('❌ Вы не можете убирать имущество другого игрока', 'error');
                return;
            }
            
            const games = JSON.parse(localStorage.getItem('monopolyGames') || '{}');
            games[currentGame.id] = currentGame;
            localStorage.setItem('monopolyGames', JSON.stringify(games));
            
            openTradeWindow();
        }

        function updateTradeMoney(playerKey, value) {
            const amount = parseInt(value) || 0;
            
            if (playerKey === 'player1' && currentPlayer.id === currentTrade.player1) {
                const player = getPlayerById(currentTrade.player1);
                if (amount > player.money) {
                    showNotif('❌ Недостаточно денег', 'error');
                    return;
                }
                currentTrade.money1 = amount;
            } else if (playerKey === 'player2' && currentPlayer.id === currentTrade.player2) {
                const player = getPlayerById(currentTrade.player2);
                if (amount > player.money) {
                    showNotif('❌ Недостаточно денег', 'error');
                    return;
                }
                currentTrade.money2 = amount;
            }
            
            const games = JSON.parse(localStorage.getItem('monopolyGames') || '{}');
            games[currentGame.id] = currentGame;
            localStorage.setItem('monopolyGames', JSON.stringify(games));
        }

        function acceptTrade() {
            if (!currentTrade) return;
            
            const isPlayer1 = currentPlayer.id === currentTrade.player1;
            const isPlayer2 = currentPlayer.id === currentTrade.player2;
            
            if (isPlayer1) {
                currentTrade.accepted1 = true;
            } else if (isPlayer2) {
                currentTrade.accepted2 = true;
            }
            
            if (currentTrade.accepted1 && currentTrade.accepted2) {
                // Совершаем обмен
                const player1 = getPlayerById(currentTrade.player1);
                const player2 = getPlayerById(currentTrade.player2);
                
                // Передаем деньги
                player1.money -= currentTrade.money1;
                player1.money += currentTrade.money2;
                player2.money -= currentTrade.money2;
                player2.money += currentTrade.money1;
                
                // Передаем имущество (оно уже временно убрано)
                currentTrade.props1.forEach(pos => {
                    currentGame.board[pos].owner = player2.id;
                    player2.props.push(pos);
                });
                
                currentTrade.props2.forEach(pos => {
                    currentGame.board[pos].owner = player1.id;
                    player1.props.push(pos);
                });
                
                addGameChat('system', `🤝 Обмен между ${player1.name} и ${player2.name} завершён!`);
                showNotif('✅ Обмен успешно завершён!', 'success');
                
                // Удаляем трейд
                currentGame.trades = currentGame.trades.filter(t => t.id !== currentTrade.id);
                currentTrade = null;
                
                closeModal('trade-modal');
            } else {
                showNotif('✅ Вы приняли обмен. Ожидайте согласия второго игрока', 'info');
                closeModal('trade-modal');
            }
            
            const games = JSON.parse(localStorage.getItem('monopolyGames') || '{}');
            games[currentGame.id] = currentGame;
            localStorage.setItem('monopolyGames', JSON.stringify(games));
        }

        function declineTrade() {
            if (!currentTrade) return;
            
            // Возвращаем имущество обратно
            if (currentTrade.props1.length > 0) {
                const player1 = getPlayerById(currentTrade.player1);
                currentTrade.props1.forEach(pos => {
                    player1.props.push(pos);
                });
            }
            
            if (currentTrade.props2.length > 0) {
                const player2 = getPlayerById(currentTrade.player2);
                currentTrade.props2.forEach(pos => {
                    player2.props.push(pos);
                });
            }
            
            currentGame.trades = currentGame.trades.filter(t => t.id !== currentTrade.id);
            currentTrade = null;
            
            const games = JSON.parse(localStorage.getItem('monopolyGames') || '{}');
            games[currentGame.id] = currentGame;
            localStorage.setItem('monopolyGames', JSON.stringify(games));
            
            closeModal('trade-modal');
            showNotif('❌ Обмен отклонён', 'info');
        }

            const container = document.getElementById('lobbies-container');
            const listDiv = document.getElementById('lobbies-list');
            
            const available = Object.values(games).filter(g => !g.started && g.players.length < g.maxPlayers);
            
            container.innerHTML = available.length ? available.map((game, index) => {
                const takenChars = game.players.map(p => p.character);
                const charFree = !takenChars.includes(selectedCharacter);
                return `
                    <div style="background:#f3f4f6; border-radius:30px; padding:15px; margin-bottom:10px; animation: slideIn 0.3s ${index * 0.1}s both;">
                        <div><strong>🔑 ${game.id}</strong> 👑 ${game.creatorName}</div>
                        <div>👥 ${game.players.length}/${game.maxPlayers}</div>
                        <div>🎭 ${game.players.map(p => charEmojis[p.character]).join(' ')}</div>
                        <button class="btn small ${charFree ? 'primary' : 'secondary'}" 
                                onclick="joinLobby('${game.id}')" 
                                ${!charFree ? 'disabled' : ''}
                                style="margin-top: 10px;">
                            ${charFree ? '✅ ПРИСОЕДИНИТЬСЯ' : '❌ ФИГУРКА ЗАНЯТА'}
                        </button>
                    </div>
                `;
            }).join('') : '<p>Нет доступных лобби</p>';
            
            listDiv.style.display = 'block';
        }

        // ==================== ВСПОМОГАТЕЛЬНЫЕ ====================
        function getCurrentPlayer() { return currentGame.players.find(p => p.id === currentPlayer.id); }
        function getPlayerById(id) { return currentGame.players.find(p => p.id === id); }
        
        function showPropModal(prop) {
            document.getElementById('prop-name').textContent = prop.name;
            document.getElementById('prop-details').innerHTML = `
                <p>💰 Цена: ${prop.price}</p>
                <p>🏠 Базовая рента: ${prop.rent[0]}</p>
                ${prop.housePrice ? `<p>🏗️ Дом: ${prop.housePrice}</p>` : ''}
            `;
            openModal('property-modal');
        }
        
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        
        function closeAllModals() {
            ['property-modal', 'auction-modal', 'trade-modal', 'select-property-modal'].forEach(id => {
                closeModal(id);
            });
        }
        
        function showNotif(msg, type = 'info') {
            const n = document.createElement('div');
            n.className = `notification ${type}`;
            n.textContent = msg;
            n.style.animation = 'notificationSlide 0.3s ease-out';
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 3000);
        }
        
        function leaveGame() { 
            if (confirm('Выйти?')) {
                if (updateInterval) clearInterval(updateInterval);
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('game-screen').style.display = 'none';
                closeAllModals();
                currentGame = null;
                currentPlayer = null;
                currentTrade = null;
                tradeProposal = null;
            }
        }

        window.onload = () => {
            games = JSON.parse(localStorage.getItem('monopolyGames') || '{}');
            selectChar('dino');
            startLobbyCleanup();
        };
    </script>
</body>
</html>
