<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎲 МОНОПОЛИЯ - ПОЛНАЯ ВЕРСИЯ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        :root {
            --primary: #4361ee;
            --primary-dark: #3a56d4;
            --secondary: #7209b7;
            --success: #06d6a0;
            --danger: #ef476f;
            --warning: #ffd166;
            --dark: #2b2d42;
            --light: #f8f9fa;
            --gray: #adb5bd;
            
            /* Цвета групп (классика) */
            --brown: #8B4513;
            --lightblue: #6bc5e8;
            --pink: #f090b0;
            --orange: #faa634;
            --red: #e84848;
            --yellow: #f5d742;
            --green: #5aa45a;
            --blue: #3f6ba5;
            --railroad: #4a4a4a;
            --utility: #a0c800;
            
            --board-size: min(700px, 65vw);
        }

        body {
            background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        #game-container {
            width: 100%;
            max-width: 1600px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        /* ЭКРАН ВХОДА */
        #login-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 48px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 550px;
            text-align: center;
            animation: float 3s infinite ease-in-out;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .game-title {
            font-size: 4em;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--dark);
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e5e7eb;
            border-radius: 30px;
            font-size: 1.1em;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(67,97,238,0.2);
        }

        /* ВЫБОР ПЕРСОНАЖА */
        .character-selector {
            margin: 30px 0;
            background: #f3f4f6;
            padding: 20px;
            border-radius: 40px;
        }

        .character-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .character-option {
            text-align: center;
            padding: 10px;
            border: 3px solid transparent;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
        }

        .character-option:hover {
            transform: scale(1.05);
            border-color: var(--primary);
        }

        .character-option.selected {
            border-color: var(--success);
            background: #ecfdf5;
            box-shadow: 0 0 0 3px var(--success);
        }

        .character-option .emoji { font-size: 2em; }

        .btn {
            padding: 15px 25px;
            border: none;
            border-radius: 40px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin-bottom: 10px;
        }

        .btn.primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(67,97,238,0.5);
        }

        .btn.secondary {
            background: white;
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .btn.small {
            padding: 8px 15px;
            font-size: 0.9em;
            width: auto;
        }

        .btn.danger {
            background: var(--danger);
            color: white;
        }

        /* ЭКРАН ЛОББИ */
        #lobby-screen {
            display: none;
            background: white;
            border-radius: 48px;
            padding: 30px;
        }

        .lobby-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .lobby-code {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 10px 25px;
            border-radius: 40px;
            font-size: 1.3em;
            font-weight: bold;
        }

        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin: 30px 0;
        }

        .lobby-player-card {
            background: #f3f4f6;
            border-radius: 30px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
        }

        .lobby-player-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8em;
        }

        .kick-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--danger);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
        }

        .lobby-chat {
            margin-top: 30px;
            border-top: 2px solid #e5e7eb;
            padding-top: 20px;
        }

        .lobby-chat-messages {
            height: 200px;
            overflow-y: auto;
            background: #f3f4f6;
            border-radius: 30px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .chat-message {
            margin-bottom: 10px;
            padding: 8px 15px;
            background: white;
            border-radius: 20px;
        }

        .chat-sender {
            font-weight: bold;
            color: var(--primary);
        }

        .lobby-chat-input {
            display: flex;
            gap: 10px;
        }

        .lobby-chat-input input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #e5e7eb;
            border-radius: 40px;
        }

        /* ЭКРАН ИГРЫ */
        #game-screen {
            display: none;
        }

        .game-header {
            background: rgba(255,255,255,0.95);
            border-radius: 60px;
            padding: 15px 30px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .turn-indicator {
            background: var(--success);
            color: white;
            padding: 8px 25px;
            border-radius: 40px;
            font-weight: bold;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }

        /* ПОЛЕ КАК НА ФОТО */
        .monopoly-board {
            width: var(--board-size);
            height: var(--board-size);
            background: white;
            border-radius: 40px;
            display: grid;
            grid-template-columns: repeat(11, 1fr);
            grid-template-rows: repeat(11, 1fr);
            gap: 2px;
            padding: 2px;
            background: #cbd5e1;
            box-shadow: 0 25px 50px -12px black;
            border: 4px solid #1e293b;
            margin-bottom: 20px;
        }

        /* ЦЕНТРАЛЬНОЕ ПОЛЕ */
        .center-cell {
            grid-column: 2 / 11;
            grid-row: 2 / 11;
            background: linear-gradient(145deg, #e5e7eb, #d1d5db);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .chance-chest {
            display: flex;
            gap: 40px;
        }

        .chance-card, .chest-card {
            width: 120px;
            height: 160px;
            background: white;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px -5px black;
            border: 3px solid var(--primary);
            cursor: pointer;
            transition: 0.3s;
            font-size: 1.2em;
            font-weight: bold;
        }

        .chance-card { background: #ffedd5; border-color: #f59e0b; }
        .chest-card { background: #dbeafe; border-color: #3b82f6; }

        .chance-card:hover, .chest-card:hover {
            transform: translateY(-15px) rotate(2deg);
        }

        /* КЛЕТКИ ПО ПЕРИМЕТРУ */
        .board-cell {
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.65em;
            text-align: center;
            padding: 2px;
            position: relative;
            border: 1px solid #d1d5db;
            cursor: pointer;
            transition: 0.15s;
        }

        .board-cell:hover {
            filter: brightness(0.95);
            transform: scale(1.02);
            z-index: 10;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .color-strip {
            width: 100%;
            height: 6px;
            position: absolute;
            top: 0;
            left: 0;
            border-radius: 2px 2px 0 0;
        }
        .brown { background: var(--brown); }
        .lightblue { background: var(--lightblue); }
        .pink { background: var(--pink); }
        .orange { background: var(--orange); }
        .red { background: var(--red); }
        .yellow { background: var(--yellow); }
        .green { background: var(--green); }
        .blue { background: var(--blue); }
        .railroad { background: var(--railroad); }
        .utility { background: var(--utility); }

        .cell-name {
            font-weight: bold;
            font-size: 0.7em;
            margin-top: 6px;
        }

        .buildings {
            display: flex;
            gap: 2px;
            margin-top: 2px;
        }
        .building {
            width: 8px;
            height: 8px;
            border-radius: 2px;
        }
        .house { background: #10b981; }
        .hotel { background: #ef4444; width: 12px; }

        .player-tokens {
            position: absolute;
            bottom: 2px;
            left: 2px;
            display: flex;
            gap: 2px;
            flex-wrap: wrap;
        }
        .token {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            border: 2px solid white;
            box-shadow: 0 2px 4px black;
        }

        .dice-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
        }

        .dice-container {
            display: flex;
            gap: 30px;
            justify-content: center;
        }

        .dice {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5em;
            box-shadow: 0 10px 15px -3px black;
            border: 3px solid var(--dark);
        }

        /* САЙДБАР */
        .sidebar {
            flex: 1;
            min-width: 300px;
            background: rgba(255,255,255,0.95);
            border-radius: 40px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .players-panel h3, .chat-panel h3 {
            color: var(--primary);
            margin-bottom: 15px;
        }

        .player-card {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: #f3f4f6;
            border-radius: 30px;
            margin-bottom: 10px;
            border-left: 6px solid transparent;
        }

        .player-card.current-turn {
            border-left-color: var(--success);
            background: #ecfdf5;
        }

        .player-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
        }

        .game-footer {
            margin-top: 20px;
            background: rgba(255,255,255,0.95);
            border-radius: 60px;
            padding: 20px 30px;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn.action {
            background: white;
            color: var(--primary);
            border: 2px solid var(--primary);
            padding: 12px 25px;
            flex: 1;
        }

        .btn.action:hover {
            background: var(--primary);
            color: white;
        }

        /* МОДАЛКИ */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: white;
            border-radius: 60px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            animation: modalPop 0.3s;
        }

        @keyframes modalPop {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .close {
            float: right;
            font-size: 2em;
            cursor: pointer;
            color: var(--gray);
        }

        .notification {
            position: fixed;
            top: 30px;
            right: 30px;
            padding: 15px 25px;
            border-radius: 60px;
            background: white;
            box-shadow: 0 20px 25px -5px black;
            z-index: 2000;
            animation: slideIn 0.3s;
            border-left: 8px solid var(--success);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- ЭКРАН ВХОДА -->
        <div id="login-screen">
            <div class="login-card">
                <h1 class="game-title">🎲 МОНОПОЛИЯ</h1>
                
                <div class="input-group">
                    <label>👤 ВАШЕ ИМЯ</label>
                    <input type="text" id="player-name" placeholder="Введите имя" maxlength="15">
                </div>
                
                <div class="character-selector">
                    <h3>🎭 ВЫБЕРИТЕ ФИГУРКУ</h3>
                    <div class="character-grid">
                        <div class="character-option selected" data-char="dino" onclick="selectChar('dino')"><div class="emoji">🦖</div></div>
                        <div class="character-option" data-char="duck" onclick="selectChar('duck')"><div class="emoji">🦆</div></div>
                        <div class="character-option" data-char="car" onclick="selectChar('car')"><div class="emoji">🚗</div></div>
                        <div class="character-option" data-char="hat" onclick="selectChar('hat')"><div class="emoji">🧢</div></div>
                        <div class="character-option" data-char="ship" onclick="selectChar('ship')"><div class="emoji">⛵</div></div>
                        <div class="character-option" data-char="dog" onclick="selectChar('dog')"><div class="emoji">🐕</div></div>
                        <div class="character-option" data-char="cat" onclick="selectChar('cat')"><div class="emoji">🐱</div></div>
                        <div class="character-option" data-char="penguin" onclick="selectChar('penguin')"><div class="emoji">🐧</div></div>
                    </div>
                </div>
                
                <button class="btn primary" onclick="createLobby()">✨ СОЗДАТЬ ЛОББИ</button>
                <button class="btn secondary" onclick="showLobbies()">📋 СПИСОК ЛОББИ</button>
                
                <div id="lobbies-list" style="margin-top: 20px; display: none;">
                    <h3>📋 ДОСТУПНЫЕ ЛОББИ:</h3>
                    <div id="lobbies-container"></div>
                </div>
            </div>
        </div>

        <!-- ЭКРАН ЛОББИ -->
        <div id="lobby-screen">
            <div class="lobby-header">
                <span class="lobby-code" id="lobby-code-display">🔑 ----</span>
                <div>
                    <span id="lobby-players-count">0/8</span>
                    <button class="btn small danger" onclick="leaveLobby()">🚪 ПОКИНУТЬ</button>
                </div>
            </div>

            <h2>👥 ИГРОКИ В ЛОББИ:</h2>
            <div id="lobby-players" class="players-grid"></div>

            <div class="lobby-chat">
                <h3>💬 ЧАТ ЛОББИ</h3>
                <div class="lobby-chat-messages" id="lobby-chat-messages"></div>
                <div class="lobby-chat-input">
                    <input type="text" id="lobby-chat-input" placeholder="Введите сообщение..." onkeypress="if(event.key==='Enter') sendLobbyChat()">
                    <button class="btn primary" onclick="sendLobbyChat()" style="width: auto;">➤</button>
                </div>
            </div>

            <button class="btn primary" onclick="startGameFromLobby()" id="start-game-lobby-btn" style="margin-top: 20px; display: none;">▶ НАЧАТЬ ИГРУ</button>
        </div>

        <!-- ЭКРАН ИГРЫ -->
        <div id="game-screen">
            <div class="game-header">
                <span class="lobby-code" id="game-code-display">🔑 ----</span>
                <span class="turn-indicator" id="turn-indicator">⏳ ОЖИДАНИЕ...</span>
                <button class="btn small" onclick="leaveGame()">🚪 ВЫЙТИ</button>
            </div>

            <div style="display: flex; gap: 20px;">
                <div>
                    <div class="monopoly-board" id="board"></div>
                    
                    <div class="dice-area">
                        <div class="dice-container">
                            <div class="dice" id="dice1">⚀</div>
                            <div class="dice" id="dice2">⚀</div>
                        </div>
                        <button class="btn primary" id="roll-dice" onclick="rollDice()" style="width: 250px;">🎲 БРОСИТЬ КОСТИ</button>
                    </div>
                </div>

                <div class="sidebar">
                    <div class="players-panel">
                        <h3>👥 ИГРОКИ</h3>
                        <div id="players-list"></div>
                    </div>

                    <div class="chat-panel">
                        <h3>💬 ЧАТ ИГРЫ</h3>
                        <div class="lobby-chat-messages" id="game-chat-messages"></div>
                        <div class="lobby-chat-input">
                            <input type="text" id="game-chat-input" placeholder="Введите сообщение..." onkeypress="if(event.key==='Enter') sendGameChat()">
                            <button class="btn primary" onclick="sendGameChat()" style="width: auto;">➤</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="game-footer">
                <div class="action-buttons">
                    <button class="btn action" onclick="showMyCards()">🏠 МОИ УЛИЦЫ</button>
                    <button class="btn action" onclick="openTradeModal()">🔄 ТРЕЙД</button>
                    <button class="btn action" onclick="buildHouse()">🏗️ ДОМ</button>
                    <button class="btn action" onclick="buildHotel()">🏨 ОТЕЛЬ</button>
                    <button class="btn action" onclick="endTurn()">⏭️ ЗАВЕРШИТЬ ХОД</button>
                </div>
            </div>
        </div>
    </div>

    <!-- МОДАЛКИ -->
    <div class="modal" id="property-modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('property-modal')">&times;</span>
            <h2 id="prop-name"></h2>
            <div id="prop-details"></div>
            <div style="display: flex; gap: 10px;">
                <button class="btn primary" onclick="buyProperty()">💰 КУПИТЬ</button>
                <button class="btn secondary" onclick="openAuctionModal()">🏷️ АУКЦИОН</button>
            </div>
        </div>
    </div>

    <div class="modal" id="auction-modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('auction-modal')">&times;</span>
            <h2>🏷️ АУКЦИОН</h2>
            <div id="auction-info"></div>
            <input type="number" id="bid-amount" placeholder="Ваша ставка (мин 10)" min="10" style="width: 100%; padding: 15px; margin: 15px 0; border-radius: 40px;">
            <button class="btn primary" onclick="placeBid()">СДЕЛАТЬ СТАВКУ</button>
        </div>
    </div>

    <div class="modal" id="trade-modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('trade-modal')">&times;</span>
            <h2>🔄 ОБМЕН</h2>
            <div id="trade-content"></div>
        </div>
    </div>

    <script>
        // ==================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ====================
        let games = {};
        let currentGame = null;
        let currentPlayer = null;
        let selectedCharacter = 'dino';
        let selectedCell = null;
        let currentAuction = null;
        let auctionTimer = null;
        let tradeTarget = null;
        let selectedMyProps = [];
        let selectedHisProps = [];

        const charEmojis = {
            'dino': '🦖', 'duck': '🦆', 'car': '🚗', 'hat': '🧢',
            'ship': '⛵', 'dog': '🐕', 'cat': '🐱', 'penguin': '🐧'
        };

        const playerColors = [
            '#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', 
            '#FFEEAD', '#D4A5A5', '#9B59B6', '#3498DB'
        ];

        // ==================== ДАННЫЕ ПОЛЯ ====================
        const boardData = [
            { pos:0, name:"СТАРТ", price:0, color:"special" },
            { pos:1, name:"УЛ.ПОБЕДЫ", price:60, color:"brown", rent:[2,10,30,90,160,250], housePrice:50 },

        // ==================== ЛОББИ ====================
        function createLobby() {
            const name = document.getElementById('player-name').value.trim();
            if (!name) return showNotif('Введите имя!', 'error');
            
            const gameId = Math.random().toString(36).substring(2, 8).toUpperCase();

                id: 'p' + Date.now() + Math.random(),

            };

            currentGame = {
                id: gameId,
                creator: currentPlayer.id,
                creatorName: name,
                players: [currentPlayer],

        function joinLobby(gameId) {
            const name = document.getElementById('player-name').value.trim();
            if (!name) return showNotif('Введите имя!', 'error');

            games = JSON.parse(localStorage.getItem('monopolyGames') || '{}');
            const game = games[gameId];
            
            if (!game) return showNotif('Лобби не найдено', 'error');
            if (game.started) return showNotif('Игра уже началась', 'error');
            if (game.players.length >= game.maxPlayers) return showNotif('Лобби заполнено', 'error');
            if (game.players.some(p => p.name === name)) return showNotif('Имя занято', 'error');
            if (game.players.some(p => p.character === selectedCharacter)) return showNotif('Фигурка занята', 'error');

            currentPlayer = {
                id: 'p' + Date.now() + Math.random(),
                name: name,
                character: selectedCharacter,
                color: playerColors[game.players.length],
                isCreator: false,
                money: 1500,
                pos: 0,
                props: [],
                inJail: false,
                jailTurns: 0,
                jailCards: 0,
                alive: true
            };

            game.players.push(currentPlayer);
            addLobbyChat(game, 'system', `👋 ${name} присоединился`);
            
            currentGame = game;
            games[gameId] = game;
            localStorage.setItem('monopolyGames', JSON.stringify(games));
            
            enterLobby();
        }

        function enterLobby() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('lobby-screen').style.display = 'block';
            document.getElementById('game-screen').style.display = 'none';
            
            document.getElementById('lobby-code-display').textContent = `🔑 ${currentGame.id}`;
            updateLobbyPlayers();
            renderLobbyChat();
            
            const startBtn = document.getElementById('start-game-lobby-btn');
            if (currentPlayer.isCreator && currentGame.players.length >= 2) {
                startBtn.style.display = 'block';
            } else {
                startBtn.style.display = 'none';
            }
        }

        function updateLobbyPlayers() {
            const container = document.getElementById('lobby-players');
            const countSpan = document.getElementById('lobby-players-count');
            
            countSpan.textContent = `${currentGame.players.length}/${currentGame.maxPlayers}`;
            
            container.innerHTML = currentGame.players.map(player => {
                const isCreator = player.id === currentGame.creator;
                const canKick = currentPlayer.isCreator && player.id !== currentPlayer.id;
                
                return `
                    <div class="lobby-player-card">
                        <div class="lobby-player-avatar" style="background: ${player.color}">
                            ${charEmojis[player.character]}
                        </div>
                        <div>
                            <strong>${player.name}</strong>
                            ${isCreator ? ' 👑' : ''}
                        </div>
                        ${canKick ? `<button class="kick-btn" onclick="kickPlayer('${player.id}')">✕</button>` : ''}
                    </div>
                `;
            }).join('');
        }

        function kickPlayer(playerId) {
            if (!currentPlayer.isCreator) return;
            
            const kickedPlayer = currentGame.players.find(p => p.id === playerId);
            if (!kickedPlayer) return;
            
            currentGame.players = currentGame.players.filter(p => p.id !== playerId);
            addLobbyChat(currentGame, 'system', `👢 ${kickedPlayer.name} был кикнут`);
            
            games[currentGame.id] = currentGame;
            localStorage.setItem('monopolyGames', JSON.stringify(games));
            
            updateLobbyPlayers();
        }

        function leaveLobby() {
            if (!currentGame || !currentPlayer) return;
            
            currentGame.players = currentGame.players.filter(p => p.id !== currentPlayer.id);
            
            if (currentPlayer.isCreator || currentGame.players.length === 0) {
                delete games[currentGame.id];
                showNotif('Лобби удалено', 'info');
            } else {
                addLobbyChat(currentGame, 'system', `🚪 ${currentPlayer.name} покинул лобби`);
                games[currentGame.id] = currentGame;
            }
            
            localStorage.setItem('monopolyGames', JSON.stringify(games));
            
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('lobby-screen').style.display = 'none';
            currentGame = null;
            currentPlayer = null;
        }

        // ==================== ЧАТ ЛОББИ ====================
        function sendLobbyChat() {
            const input = document.getElementById('lobby-chat-input');
            const text = input.value.trim();
            if (!text || !currentGame) return;
            
            addLobbyChat(currentGame, currentPlayer.name, text);
            input.value = '';
        }

        function addLobbyChat(game, sender, text) {
            if (!game.chats) game.chats = [];
            
            game.chats.push({
                sender: sender,
                text: text,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            });
            
            if (game.chats.length > 50) game.chats.shift();
            
            if (currentGame && currentGame.id === game.id) {
                renderLobbyChat();
            }
            
            games[game.id] = game;
            localStorage.setItem('monopolyGames', JSON.stringify(games));
        }

        function renderLobbyChat() {
            const container = document.getElementById('lobby-chat-messages');
            if (!container || !currentGame || !currentGame.chats) return;
            
            container.innerHTML = currentGame.chats.map(msg => `
                <div class="chat-message">
                    <span class="chat-sender">${msg.sender}:</span>
                    ${msg.text}
                    <span style="float: right; color: var(--gray); font-size: 0.7em;">${msg.time}</span>
                </div>
            `).join('');
            
            container.scrollTop = container.scrollHeight;
        }

        // ==================== НАЧАЛО ИГРЫ ====================
        function startGameFromLobby() {
            if (!currentPlayer.isCreator) return;
            if (currentGame.players.length < 2) return showNotif('Нужно минимум 2 игрока', 'error');
            
            currentGame.started = true;
            currentGame.turn = currentGame.players[0].id;
            
            // Копируем чат в игровой чат
            currentGame.gameChats = [...(currentGame.chats || [])];
            
            games[currentGame.id] = currentGame;
            localStorage.setItem('monopolyGames', JSON.stringify(games));
            
            enterGame();
        }

        function enterGame() {
            document.getElementById('lobby-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            
            document.getElementById('game-code-display').textContent = `🔑 ${currentGame.id}`;
            renderBoard();
            updatePlayersList();
            renderGameChat();
            updateTurnIndicator();
        }

        // ==================== ПОЛЕ ====================
        function renderBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            
            // Создаем 11x11 сетку
            for (let row = 0; row < 11; row++) {
                for (let col = 0; col < 11; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'board-cell';
                    
                    // Углы
                    if (row === 0 && col === 0) {
                        cell.innerHTML = '<div class="cell-name">СТАРТ</div>';
                        cell.onclick = () => showCellInfo(0);
                    } 
                    else if (row === 0 && col === 10) {
                        cell.innerHTML = '<div class="cell-name">ТЮРЬМА</div>';
                        cell.onclick = () => showCellInfo(10);
                    }
                    else if (row === 10 && col === 0) {
                        cell.innerHTML = '<div class="cell-name">ПАРКОВКА</div>';
                        cell.onclick = () => showCellInfo(20);
                    }
                    else if (row === 10 && col === 10) {
                        cell.innerHTML = '<div class="cell-name">В ТЮРЬМУ</div>';
                        cell.onclick = () => showCellInfo(30);
                    }
                    // Верхний ряд (1-9)
                    else if (row === 0) {
                        const pos = col;
                        addPropertyCell(cell, pos);
                    }
                    // Нижний ряд (21-29 в обратном порядке)
                    else if (row === 10) {
                        const pos = 30 - col;
                        if (pos >= 21 && pos <= 29) addPropertyCell(cell, pos);
                    }
                    // Левый ряд (19-11 снизу вверх)
                    else if (col === 0) {
                        const pos = 20 - row;
                        if (pos >= 11 && pos <= 19) addPropertyCell(cell, pos);
                    }
                    // Правый ряд (1-9 сверху вниз)
                    else if (col === 10) {
                        const pos = 9 + row;
                        if (pos >= 1 && pos <= 9) addPropertyCell(cell, pos);
                    }
                    // Центр (ШАНС и КАЗНА)
                    else if (row >= 2 && row <= 9 && col >= 2 && col <= 9) {
                        if (row === 5 && col === 5) {
                            cell.innerHTML = `
                                <div class="center-cell">
                                    <div class="chance-chest">
                                        <div class="chance-card" onclick="drawChance()">
                                            <div style="font-size: 3em;">🎲</div>
                                            <div>ШАНС</div>
                                        </div>
                                        <div class="chest-card" onclick="drawChest()">
                                            <div style="font-size: 3em;">📦</div>
                                            <div>КАЗНА</div>
                                        </div>
                                    </div>
                                </div>
                            `;
                        } else {
                            cell.style.background = '#e5e7eb';
                        }
                    }
                    else {
                        cell.style.background = '#e5e7eb';
                    }
                    
                    // Добавляем фишки игроков
                    const playersHere = currentGame.players.filter(p => p.pos === getPosFromCell(row, col));
                    if (playersHere.length) {
                        const tokensDiv = document.createElement('div');
                        tokensDiv.className = 'player-tokens';
                        playersHere.forEach(p => {
                            const tok = document.createElement('div');
                            tok.className = 'token';
                            tok.style.backgroundColor = p.color;
                            tok.textContent = charEmojis[p.character];
                            tok.title = p.name;
                            tokensDiv.appendChild(tok);
                        });
                        cell.appendChild(tokensDiv);
                    }
                    
                    board.appendChild(cell);
                }
            }
        }

        function addPropertyCell(cell, pos) {
            const prop = currentGame.board[pos];
            if (!prop) return;
            
            if (prop.color !== 'special' && prop.color !== 'tax') {
                const strip = document.createElement('div');
                strip.className = `color-strip ${prop.color}`;
                cell.appendChild(strip);
            }
            
            cell.innerHTML += `<div class="cell-name">${prop.name}</div>`;
            if (prop.price) cell.innerHTML += `<div>${prop.price}</div>`;
            
            if (prop.houses > 0 || prop.hotel) {
                const bDiv = document.createElement('div');
                bDiv.className = 'buildings';
                if (prop.hotel) {
                    bDiv.innerHTML = '<div class="building hotel"></div>';
                } else {
                    for (let i = 0; i < prop.houses; i++) {
                        bDiv.innerHTML += '<div class="building house"></div>';
                    }
                }
                cell.appendChild(bDiv);
            }
            
            cell.onclick = () => showCellInfo(pos);
        }

        function getPosFromCell(row, col) {
            if (row === 0 && col === 0) return 0;
            if (row === 0 && col === 10) return 10;
            if (row === 10 && col === 0) return 20;
            if (row === 10 && col === 10) return 30;
            if (row === 0) return col;
            if (row === 10) return 30 - col;
            if (col === 0) return 20 - row;
            if (col === 10) return 9 + row;
            return -1;
        }

        function showCellInfo(pos) {
            if (pos < 0) return;
            const prop = currentGame.board[pos];
            let msg = `${prop.name}\n`;
            if (prop.owner) {
                const owner = currentGame.players.find(p => p.id === prop.owner);
                msg += `Владелец: ${owner.name}\nАренда: ${prop.rent[prop.houses || 0]}`;
            } else if (prop.price > 0) {
                msg += `Цена: ${prop.price}💰\nАренда: ${prop.rent[0]}`;
            }
            showNotif(msg);
        }

        // ==================== ИГРОВАЯ МЕХАНИКА ====================
        function rollDice() {
            if (!currentGame.started) return showNotif('Игра не начата', 'error');
            if (currentPlayer.id !== currentGame.turn) return showNotif('Не ваш ход', 'error');
            if (currentGame.diceRolled) return showNotif('Вы уже бросили', 'error');
            
            const d1 = Math.floor(Math.random() * 6) + 1;
            const d2 = Math.floor(Math.random() * 6) + 1;
            document.getElementById('dice1').textContent = ['⚀','⚁','⚂','⚃','⚄','⚅'][d1-1];
            document.getElementById('dice2').textContent = ['⚀','⚁','⚂','⚃','⚄','⚅'][d2-1];
            
            const player = getCurrentPlayer();
            const oldPos = player.pos;
            const total = d1 + d2;
            
            // Анимация движения
            let steps = total;
            const moveInterval = setInterval(() => {
                if (steps === 0) {
                    clearInterval(moveInterval);
                    afterMove();
                    return;
                }
                player.pos = (player.pos + 1) % 40;
                renderBoard();
                steps--;
            }, 200);
            
            function afterMove() {
                if (player.pos < oldPos) {
                    player.money += 200;
                    addGameChat('system', `${player.name} +200 за Старт`);
                }
                
                const land = currentGame.board[player.pos];
                
                if (land.type === 'tax') {
                    if (player.money >= land.price) {
                        player.money -= land.price;
                        currentGame.jackpot += land.price;
                    } else bankrupt(player);
                }
                else if (land.type === 'gotojail') {
                    player.inJail = true;
                    player.pos = 10;
                    addGameChat('system', `${player.name} в тюрьму`);
                }
                else if (land.price > 0 && !land.owner) {
                    selectedCell = player.pos;
                    showPropModal(land);
                }
                else if (land.owner && land.owner !== player.id) {
                    payRent(player, land);
                }
                
                currentGame.diceRolled = true;
                if (d1 !== d2) {
                    nextTurn();
                } else {
                    showNotif('ДУБЛЬ! Ещё ход', 'warning');
                }
                renderBoard();
                updatePlayersList();
                saveGame();
            }
        }

        function payRent(player, prop) {
            let rent = prop.rent[prop.houses || 0];
            if (prop.color === 'railroad') {
                const owner = getPlayerById(prop.owner);
                const cnt = owner.props.filter(p => currentGame.board[p].color === 'railroad').length;
                rent = [25, 50, 100, 200][cnt-1];
            }
            if (player.money >= rent) {
                player.money -= rent;
                getPlayerById(prop.owner).money += rent;
                addGameChat('system', `${player.name} заплатил ${rent}💰`);
            } else bankrupt(player, prop.owner);
        }

        function drawChance() {
            if (currentPlayer.id !== currentGame.turn) return showNotif('Не ваш ход', 'error');
            const card = chanceCards[Math.floor(Math.random() * chanceCards.length)];
            applyCard(card);
            addGameChat('system', `${currentPlayer.name}: ШАНС — ${card.text}`);
        }

        function drawChest() {
            if (currentPlayer.id !== currentGame.turn) return showNotif('Не ваш ход', 'error');
            const card = chestCards[Math.floor(Math.random() * chestCards.length)];
            applyCard(card);
            addGameChat('system', `${currentPlayer.name}: КАЗНА — ${card.text}`);
        }

        function applyCard(card) {
            const player = getCurrentPlayer();
            if (card.money) player.money += card.money;
            if (card.jail) { player.inJail = true; player.pos = 10; }
            if (card.pos !== undefined) player.pos = card.pos;
            if (card.jailCard) player.jailCards++;
            renderBoard();
            updatePlayersList();
            saveGame();
        }

        function buyProperty() {
            if (selectedCell === null) return;
            const player = getCurrentPlayer();
            const prop = currentGame.board[selectedCell];
            if (player.money >= prop.price) {
                player.money -= prop.price;
                prop.owner = player.id;
                player.props.push(selectedCell);
                addGameChat('system', `${player.name} купил ${prop.name}`);
                showNotif(`✅ Куплено!`);
            } else showNotif('❌ Не хватает денег', 'error');
            closeModal('property-modal');
            renderBoard();
            updatePlayersList();
            saveGame();
        }

        function openAuctionModal() {
            closeModal('property-modal');
            const prop = currentGame.board[selectedCell];
            currentAuction = { prop, bid: 10, leader: null, timer: 5, active: false };
            document.getElementById('auction-info').innerHTML = `
                <p>Лот: <strong>${prop.name}</strong></p>
                <p>💰 Ставка: <span id="current-bid">10</span></p>
                <p>👑 Лидер: <span id="bid-leader">—</span></p>
                <p>⏳ <span id="auction-timer">5</span>с</p>
            `;
            openModal('auction-modal');
        }

        function placeBid() {
            if (!currentAuction) return;
            const amount = parseInt(document.getElementById('bid-amount').value);
            if (amount < 10 || amount <= currentAuction.bid) return showNotif('Ставка должна быть больше', 'error');
            if (amount > currentPlayer.money) return showNotif('Не хватает денег', 'error');
            
            currentAuction.bid = amount;
            currentAuction.leader = currentPlayer.id;
            currentAuction.timer = 5;
            currentAuction.active = true;
            document.getElementById('current-bid').textContent = amount;
            document.getElementById('bid-leader').textContent = currentPlayer.name;
            
            if (auctionTimer) clearInterval(auctionTimer);
            auctionTimer = setInterval(() => {
                currentAuction.timer--;
                document.getElementById('auction-timer').textContent = currentAuction.timer;
                if (currentAuction.timer <= 0) {
                    clearInterval(auctionTimer);
                    endAuction();
                }
            }, 1000);
        }

        function endAuction() {
            if (!currentAuction) return;
            if (currentAuction.leader) {
                const winner = getPlayerById(currentAuction.leader);
                winner.money -= currentAuction.bid;
                currentAuction.prop.owner = winner.id;
                winner.props.push(selectedCell);
                addGameChat('system', `🏆 ${winner.name} выиграл аукцион за ${currentAuction.bid}💰`);
            }
            currentAuction = null;
            closeModal('auction-modal');
            renderBoard();
            updatePlayersList();
            saveGame();
        }

        function buildHouse() {
            if (currentPlayer.id !== currentGame.turn) return showNotif('Не ваш ход', 'error');
            const player = getCurrentPlayer();
            const buildable = player.props.find(pos => {
                const p = currentGame.board[pos];
                return p.housePrice && !p.hotel && (p.houses || 0) < 4 && hasFullGroup(p.color);
            });
            if (!buildable) return showNotif('Нет доступных для стройки', 'error');
            const prop = currentGame.board[buildable];
            if (player.money >= prop.housePrice) {
                player.money -= prop.housePrice;
                prop.houses = (prop.houses || 0) + 1;
                addGameChat('system', `${player.name} построил дом на ${prop.name}`);
                renderBoard();
                updatePlayersList();
                saveGame();
            }
        }

        function buildHotel() {
            if (currentPlayer.id !== currentGame.turn) return showNotif('Не ваш ход', 'error');
            const player = getCurrentPlayer();
            const hotelable = player.props.find(pos => {
                const p = currentGame.board[pos];
                return p.houses === 4 && !p.hotel;
            });
            if (!hotelable) return showNotif('Нет улиц с 4 домами', 'error');
            const prop = currentGame.board[hotelable];
            if (player.money >= prop.housePrice) {
                player.money -= prop.housePrice;
                prop.hotel = true;
                prop.houses = 0;
                addGameChat('system', `${player.name} построил отель на ${prop.name}`);
                renderBoard();
                updatePlayersList();
                saveGame();
            }
        }

        function hasFullGroup(color) {
            const player = getCurrentPlayer();
            const groupSizes = { brown:2, lightblue:3, pink:3, orange:3, red:3, yellow:3, green:3, blue:2 };
            const needed = groupSizes[color] || 2;
            const owned = player.props.filter(p => currentGame.board[p].color === color).length;
            return owned >= needed;
        }

        function nextTurn() {
            const alive = currentGame.players.filter(p => p.alive);
            let idx = alive.findIndex(p => p.id === currentGame.turn);
            idx = (idx + 1) % alive.length;
            currentGame.turn = alive[idx].id;
            currentGame.diceRolled = false;
            updateTurnIndicator();
            if (currentPlayer.id === currentGame.turn) showNotif('🎲 ВАШ ХОД!', 'warning');
            saveGame();
        }

        function endTurn() {
            if (currentPlayer.id !== currentGame.turn) return showNotif('Не ваш ход', 'error');
            nextTurn();
        }

        // ==================== ЧАТ ИГРЫ ====================
        function sendGameChat() {
            const input = document.getElementById('game-chat-input');
            const text = input.value.trim();
            if (!text || !currentGame) return;
            addGameChat(currentPlayer.name, text);
            input.value = '';
        }

        function addGameChat(sender, text) {
            if (!currentGame.gameChats) currentGame.gameChats = [];
            currentGame.gameChats.push({
                sender, text,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            });
            if (currentGame.gameChats.length > 50) currentGame.gameChats.shift();
            renderGameChat();
            saveGame();
        }

        function renderGameChat() {
            const container = document.getElementById('game-chat-messages');
            if (!container || !currentGame.gameChats) return;
            container.innerHTML = currentGame.gameChats.map(msg => `
                <div class="chat-message">
                    <span class="chat-sender">${msg.sender}:</span> ${msg.text}
                    <span style="float:right;color:var(--gray);font-size:0.7em;">${msg.time}</span>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }

        // ==================== ОБНОВЛЕНИЕ ИГРОКОВ ====================
        function updatePlayersList() {
            const container = document.getElementById('players-list');
            if (!container) return;
            container.innerHTML = currentGame.players.map(p => `
                <div class="player-card ${p.id === currentGame.turn ? 'current-turn' : ''}">
                    <div class="player-avatar" style="background: ${p.color}">${charEmojis[p.character]}</div>
                    <div>
                        <div class="player-name">${p.name} ${p.inJail ? '🚓' : ''}</div>
                        <div>💰 ${p.money}</div>
                        <div>🏠 ${p.props.length}</div>
                    </div>
                </div>
            `).join('');
        }

        function updateTurnIndicator() {
            const ind = document.getElementById('turn-indicator');
            if (!currentGame.started) ind.textContent = '⏳ ОЖИДАНИЕ...';
            else {
                const p = getPlayerById(currentGame.turn);
                ind.textContent = `🎲 ХОДИТ: ${p.name}`;
            }
        }

        // ==================== ТРЕЙД ====================
        function openTradeModal() {
            const others = currentGame.players.filter(p => p.id !== currentPlayer.id && p.alive);
            if (!others.length) return showNotif('Нет других игроков', 'error');
            let html = '<p>Выберите игрока:</p>';
            others.forEach(p => {
                html += `<button class="btn secondary" onclick="selectTradeTarget('${p.id}')">${charEmojis[p.character]} ${p.name}</button>`;
            });
            document.getElementById('trade-content').innerHTML = html;
            openModal('trade-modal');
        }

        function selectTradeTarget(id) {
            tradeTarget = id;
            selectedMyProps = [];
            selectedHisProps = [];
            showTradeWindow();
        }

        function showTradeWindow() {
            const target = getPlayerById(tradeTarget);
            const me = getCurrentPlayer();
            let html = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;">';
            html += `<div><h3>${charEmojis[me.character]} ${me.name}</h3>`;
            me.props.forEach(pos => {
                const p = currentGame.board[pos];
                const sel = selectedMyProps.includes(pos) ? 'style="background:#d1fae5;"' : '';
                html += `<div class="property-item" ${sel} onclick="toggleMyProp(${pos})">${p.name}</div>`;
            });
            html += `</div><div><h3>${charEmojis[target.character]} ${target.name}</h3>`;
            target.props.forEach(pos => {
                const p = currentGame.board[pos];
                const sel = selectedHisProps.includes(pos) ? 'style="background:#d1fae5;"' : '';
                html += `<div class="property-item" ${sel} onclick="toggleHisProp(${pos})">${p.name}</div>`;
            });
            html += '</div></div><button class="btn primary" onclick="proposeTrade()">ПРЕДЛОЖИТЬ</button>';
            document.getElementById('trade-content').innerHTML = html;
        }

        function toggleMyProp(pos) {
            const idx = selectedMyProps.indexOf(pos);
            if (idx === -1) selectedMyProps.push(pos); else selectedMyProps.splice(idx, 1);
            showTradeWindow();
        }

        function toggleHisProp(pos) {
            const idx = selectedHisProps.indexOf(pos);
            if (idx === -1) selectedHisProps.push(pos); else selectedHisProps.splice(idx, 1);
            showTradeWindow();
        }

        function proposeTrade() {
            const target = getPlayerById(tradeTarget);
            const me = getCurrentPlayer();
            selectedMyProps.forEach(pos => {
                currentGame.board[pos].owner = target.id;
                target.props.push(pos);
                me.props = me.props.filter(p => p !== pos);
            });
            selectedHisProps.forEach(pos => {
                currentGame.board[pos].owner = me.id;
                me.props.push(pos);
                target.props = target.props.filter(p => p !== pos);
            });
            addGameChat('system', `🤝 Обмен между ${me.name} и ${target.name}`);
            closeModal('trade-modal');
            renderBoard();
            updatePlayersList();
            saveGame();
        }

        // ==================== МОИ КАРТЫ ====================
        function showMyCards() {
            const me = getCurrentPlayer();
            if (!me.props.length) return showNotif('Нет собственности', 'info');
            let msg = '🏠 ВАША СОБСТВЕННОСТЬ:\n';
            me.props.forEach(pos => {
                const p = currentGame.board[pos];
                msg += `${p.name} — ${p.price}💰`;
                if (p.houses) msg += ` (${p.houses}🏠)`;
                if (p.hotel) msg += ` (🏨)`;
                msg += `\n`;
            });
            showNotif(msg);
        }

        // ==================== СПИСОК ЛОББИ ====================
        function showLobbies() {
            games = JSON.parse(localStorage.getItem('monopolyGames') || '{}');
            const container = document.getElementById('lobbies-container');
            const listDiv = document.getElementById('lobbies-list');
            
            const available = Object.values(games).filter(g => !g.started && g.players.length < g.maxPlayers);
            
            container.innerHTML = available.length ? available.map(game => {
                const takenChars = game.players.map(p => p.character);
                const charFree = !takenChars.includes(selectedCharacter);
                return `
                    <div style="background:#f3f4f6; border-radius:30px; padding:15px; margin-bottom:10px;">
                        <div><strong>🔑 ${game.id}</strong> 👑 ${game.creatorName}</div>
                        <div>👥 ${game.players.length}/${game.maxPlayers}</div>
                        <div>🎭 ${game.players.map(p => charEmojis[p.character]).join(' ')}</div>
                        <button class="btn small ${charFree ? 'primary' : 'secondary'}" 
                                onclick="joinLobby('${game.id}')" 
                                ${!charFree ? 'disabled' : ''}>
                            ${charFree ? '✅ ПРИСОЕДИНИТЬСЯ' : '❌ ФИГУРКА ЗАНЯТА'}
                        </button>
                    </div>
                `;
            }).join('') : '<p>Нет доступных лобби</p>';
            
            listDiv.style.display = 'block';
        }

        // ==================== ВСПОМОГАТЕЛЬНЫЕ ====================
        function getCurrentPlayer() { return currentGame.players.find(p => p.id === currentPlayer.id); }
        function getPlayerById(id) { return currentGame.players.find(p => p.id === id); }
        function showPropModal(prop) {
            document.getElementById('prop-name').textContent = prop.name;
            document.getElementById('prop-details').innerHTML = `
                <p>💰 Цена: ${prop.price}</p>
                <p>🏠 Базовая рента: ${prop.rent[0]}</p>
                ${prop.housePrice ? `<p>🏗️ Дом: ${prop.housePrice}</p>` : ''}
            `;
            openModal('property-modal');
        }
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function showNotif(msg, type = 'info') {
            const n = document.createElement('div');
            n.className = `notification ${type}`;
            n.textContent = msg;
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 3000);
        }
        function saveGame() { if (currentGame) { games[currentGame.id] = currentGame; localStorage.setItem('monopolyGames', JSON.stringify(games)); } }
        function leaveGame() { if (confirm('Выйти?')) { document.getElementById('login-screen').style.display='flex'; document.getElementById('game-screen').style.display='none'; currentGame=null; currentPlayer=null; } }

        window.onload = () => {
            games = JSON.parse(localStorage.getItem('monopolyGames') || '{}');
            selectChar('dino');
        };
    </script>
</body>
</html>
