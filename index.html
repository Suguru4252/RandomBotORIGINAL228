<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎲 МОНОПОЛИЯ - РАБОЧАЯ ВЕРСИЯ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        :root {
            --primary: #4361ee;
            --primary-dark: #3a56d4;
            --secondary: #7209b7;
            --success: #06d6a0;
            --danger: #ef476f;
            --warning: #ffd166;
            --dark: #2b2d42;
            --light: #f8f9fa;
            --gray: #adb5bd;
            --admin: #9d4edd;
            
            --brown: #8B4513;
            --lightblue: #6bc5e8;
            --pink: #f090b0;
            --orange: #faa634;
            --red: #e84848;
            --yellow: #f5d742;
            --green: #5aa45a;
            --blue: #3f6ba5;
            --railroad: #4a4a4a;
            --utility: #a0c800;
            
            --board-size: min(700px, 65vw);
        }

        body {
            background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        body.admin-mode {
            background: linear-gradient(145deg, #2d1b3a 0%, #4a1d4a 100%);
        }

        .admin-badge {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            background: var(--admin);
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: bold;
            z-index: 9999;
        }

        body.admin-mode .admin-badge {
            display: block;
        }

        #game-container {
            width: 100%;
            max-width: 1600px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        /* ЭКРАН ВХОДА */
        #login-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 48px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 550px;
            text-align: center;
        }

        .game-title {
            font-size: 4em;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--dark);
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e5e7eb;
            border-radius: 30px;
            font-size: 1.1em;
        }

        .character-selector {
            margin: 30px 0;
            background: #f3f4f6;
            padding: 20px;
            border-radius: 40px;
        }

        .character-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .character-option {
            text-align: center;
            padding: 10px;
            border: 3px solid transparent;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
        }

        .character-option:hover {
            transform: scale(1.05);
            border-color: var(--primary);
        }

        .character-option.selected {
            border-color: var(--success);
            background: #ecfdf5;
        }

        .character-option .emoji { font-size: 2em; }

        .btn {
            padding: 15px 25px;
            border: none;
            border-radius: 40px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin-bottom: 10px;
        }

        .btn.primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(67,97,238,0.5);
        }

        .btn.secondary {
            background: white;
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .btn.small {
            padding: 8px 15px;
            font-size: 0.9em;
            width: auto;
        }

        .btn.danger {
            background: var(--danger);
            color: white;
        }

        /* ЭКРАН ЛОББИ */
        #lobby-screen {
            display: none;
            background: white;
            border-radius: 48px;
            padding: 30px;
        }

        .lobby-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .lobby-code {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 10px 25px;
            border-radius: 40px;
            font-size: 1.3em;
            font-weight: bold;
        }

        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin: 30px 0;
        }

        .lobby-player-card {
            background: #f3f4f6;
            border-radius: 30px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
        }

        .lobby-player-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8em;
        }

        .kick-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--danger);
            color: white;
            border: none;
            cursor: pointer;
        }

        .lobby-chat {
            margin-top: 30px;
            border-top: 2px solid #e5e7eb;
            padding-top: 20px;
        }

        .lobby-chat-messages {
            height: 200px;
            overflow-y: auto;
            background: #f3f4f6;
            border-radius: 30px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .chat-message {
            margin-bottom: 10px;
            padding: 8px 15px;
            background: white;
            border-radius: 20px;
        }

        .chat-sender {
            font-weight: bold;
            color: var(--primary);
        }

        .lobby-chat-input {
            display: flex;
            gap: 10px;
        }

        .lobby-chat-input input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #e5e7eb;
            border-radius: 40px;
        }

        .start-game-btn {
            background: var(--warning);
            color: var(--dark);
            border: none;
            padding: 15px 30px;
            border-radius: 40px;
            font-size: 1.3em;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }

        .start-game-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ЭКРАН ИГРЫ */
        #game-screen {
            display: none;
        }

        .game-header {
            background: rgba(255,255,255,0.95);
            border-radius: 60px;
            padding: 15px 30px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .turn-indicator {
            background: var(--success);
            color: white;
            padding: 8px 25px;
            border-radius: 40px;
            font-weight: bold;
        }

        /* ПОЛЕ */
        .monopoly-board {
            width: var(--board-size);
            height: var(--board-size);
            background: white;
            border-radius: 40px;
            display: grid;
            grid-template-columns: repeat(11, 1fr);
            grid-template-rows: repeat(11, 1fr);
            gap: 2px;
            padding: 2px;
            background: #cbd5e1;
            border: 4px solid #1e293b;
            margin-bottom: 20px;
        }

        .board-cell {
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.65em;
            text-align: center;
            padding: 2px;
            position: relative;
            border: 1px solid #d1d5db;
            cursor: pointer;
        }

        .color-strip {
            width: 100%;
            height: 6px;
            position: absolute;
            top: 0;
            left: 0;
        }
        .brown { background: var(--brown); }
        .lightblue { background: var(--lightblue); }
        .pink { background: var(--pink); }
        .orange { background: var(--orange); }
        .red { background: var(--red); }
        .yellow { background: var(--yellow); }
        .green { background: var(--green); }
        .blue { background: var(--blue); }
        .railroad { background: var(--railroad); }
        .utility { background: var(--utility); }

        .player-tokens {
            position: absolute;
            bottom: 2px;
            left: 2px;
            display: flex;
            gap: 2px;
            flex-wrap: wrap;
        }
        .token {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            border: 2px solid white;
        }

        .dice-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
        }

        .dice-container {
            display: flex;
            gap: 30px;
            justify-content: center;
        }

        .dice {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5em;
            border: 3px solid var(--dark);
        }

        .sidebar {
            flex: 1;
            min-width: 300px;
            background: rgba(255,255,255,0.95);
            border-radius: 40px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .players-panel h3, .chat-panel h3 {
            color: var(--primary);
            margin-bottom: 15px;
        }

        .player-card {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: #f3f4f6;
            border-radius: 30px;
            margin-bottom: 10px;
            border-left: 6px solid transparent;
        }

        .player-card.current-turn {
            border-left-color: var(--success);
            background: #ecfdf5;
        }

        .player-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
        }

        .game-footer {
            margin-top: 20px;
            background: rgba(255,255,255,0.95);
            border-radius: 60px;
            padding: 20px 30px;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn.action {
            background: white;
            color: var(--primary);
            border: 2px solid var(--primary);
            padding: 12px 25px;
            flex: 1;
        }

        /* МОДАЛКИ */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: white;
            border-radius: 60px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .notification {
            position: fixed;
            top: 30px;
            right: 30px;
            padding: 15px 25px;
            border-radius: 60px;
            background: white;
            box-shadow: 0 20px 25px -5px black;
            z-index: 2000;
            animation: slideIn 0.3s;
            border-left: 8px solid var(--success);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* ТРЕЙД */
        .trade-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 20px 0;
        }

        .trade-column {
            background: #f3f4f6;
            border-radius: 30px;
            padding: 15px;
        }

        .property-item {
            padding: 10px;
            margin: 5px 0;
            background: white;
            border-radius: 15px;
            cursor: pointer;
        }

        .property-item.selected {
            background: #d1fae5;
            border: 2px solid var(--success);
        }

        .add-button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            margin: 10px 0;
        }

        .add-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .money-input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e5e7eb;
            border-radius: 20px;
            margin: 10px 0;
        }

        .trade-notification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 60px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            z-index: 2000;
            min-width: 400px;
            text-align: center;
        }

        .trade-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .admin-delete-btn {
            position: absolute;
            top: -10px;
            right: -10px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--danger);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 1.5em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-item {
            position: relative;
            background: #f3f4f6;
            border-radius: 30px;
            padding: 15px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="admin-badge" id="admin-badge">⚡ АДМИН РЕЖИМ ⚡</div>

    <div id="game-container">
        <div id="login-screen">
            <div class="login-card">
                <h1 class="game-title">🎲 МОНОПОЛИЯ</h1>
                
                <div class="input-group">
                    <label>👤 ВАШЕ ИМЯ</label>
                    <input type="text" id="player-name" placeholder="Введите имя" maxlength="15">
                </div>
                
                <div class="character-selector">
                    <h3>🎭 ВЫБЕРИТЕ ФИГУРКУ</h3>
                    <div class="character-grid">
                        <div class="character-option selected" data-char="dino" onclick="selectChar('dino')"><div class="emoji">🦖</div></div>
                        <div class="character-option" data-char="duck" onclick="selectChar('duck')"><div class="emoji">🦆</div></div>
                        <div class="character-option" data-char="car" onclick="selectChar('car')"><div class="emoji">🚗</div></div>
                        <div class="character-option" data-char="hat" onclick="selectChar('hat')"><div class="emoji">🧢</div></div>
                        <div class="character-option" data-char="ship" onclick="selectChar('ship')"><div class="emoji">⛵</div></div>
                        <div class="character-option" data-char="dog" onclick="selectChar('dog')"><div class="emoji">🐕</div></div>
                        <div class="character-option" data-char="cat" onclick="selectChar('cat')"><div class="emoji">🐱</div></div>
                        <div class="character-option" data-char="penguin" onclick="selectChar('penguin')"><div class="emoji">🐧</div></div>
                    </div>
                </div>
                
                <button class="btn primary" onclick="createLobby()">✨ СОЗДАТЬ ЛОББИ</button>
                <button class="btn secondary" onclick="showLobbies()">📋 СПИСОК ЛОББИ</button>
                
                <div id="lobbies-list" style="margin-top: 20px; display: none;">
                    <h3>📋 ДОСТУПНЫЕ ЛОББИ:</h3>
                    <div id="lobbies-container"></div>
                </div>
            </div>
        </div>

        <div id="lobby-screen">
            <div class="lobby-header">
                <span class="lobby-code" id="lobby-code-display">🔑 ----</span>
                <button class="btn small danger" onclick="leaveLobby()">🚪 ПОКИНУТЬ</button>
            </div>

            <h2>👥 ИГРОКИ В ЛОББИ:</h2>
            <div id="lobby-players" class="players-grid"></div>

            <div class="lobby-chat">
                <h3>💬 ЧАТ ЛОББИ</h3>
                <div class="lobby-chat-messages" id="lobby-chat-messages"></div>
                <div class="lobby-chat-input">
                    <input type="text" id="lobby-chat-input" placeholder="Введите сообщение...">
                    <button class="btn primary" onclick="sendLobbyChat()">➤</button>
                </div>
            </div>

            <button class="start-game-btn" id="start-game-btn" onclick="startGame()">▶ НАЧАТЬ ИГРУ</button>
        </div>

        <div id="game-screen">
            <div class="game-header">
                <span class="lobby-code" id="game-code-display">🔑 ----</span>
                <span class="turn-indicator" id="turn-indicator">⏳ ОЖИДАНИЕ...</span>
                <button class="btn small" onclick="leaveGame()">🚪 ВЫЙТИ</button>
            </div>

            <div style="display: flex; gap: 20px;">
                <div>
                    <div class="monopoly-board" id="board"></div>
                    
                    <div class="dice-area">
                        <div class="dice-container">
                            <div class="dice" id="dice1">⚀</div>
                            <div class="dice" id="dice2">⚀</div>
                        </div>
                        <button class="btn primary" id="roll-dice" onclick="rollDice()" style="width: 250px;">🎲 БРОСИТЬ КОСТИ</button>
                    </div>
                </div>

                <div class="sidebar">
                    <div class="players-panel">
                        <h3>👥 ИГРОКИ</h3>
                        <div id="players-list"></div>
                    </div>

                    <div class="chat-panel">
                        <h3>💬 ЧАТ ИГРЫ</h3>
                        <div class="lobby-chat-messages" id="game-chat-messages"></div>
                        <div class="lobby-chat-input">
                            <input type="text" id="game-chat-input" placeholder="Введите сообщение...">
                            <button class="btn primary" onclick="sendGameChat()">➤</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="game-footer">
                <div class="action-buttons">
                    <button class="btn action" onclick="showMyCards()">🏠 МОИ УЛИЦЫ</button>
                    <button class="btn action" onclick="openTradeModal()">🔄 ТРЕЙД</button>
                    <button class="btn action" onclick="buildHouse()">🏗️ ДОМ</button>
                    <button class="btn action" onclick="buildHotel()">🏨 ОТЕЛЬ</button>
                    <button class="btn action" onclick="endTurn()">⏭️ ЗАВЕРШИТЬ ХОД</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="property-modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('property-modal')">&times;</span>
            <h2 id="prop-name"></h2>
            <div id="prop-details"></div>
            <div style="display: flex; gap: 10px;">
                <button class="btn primary" onclick="buyProperty()">💰 КУПИТЬ</button>
                <button class="btn secondary" onclick="openAuctionModal()">🏷️ АУКЦИОН</button>
            </div>
        </div>
    </div>

    <div class="modal" id="auction-modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('auction-modal')">&times;</span>
            <h2>🏷️ АУКЦИОН</h2>
            <div id="auction-info"></div>
            <input type="number" id="bid-amount" placeholder="Ваша ставка (мин 10)" min="10" style="width: 100%; padding: 15px; margin: 15px 0; border-radius: 40px;">
            <button class="btn primary" onclick="placeBid()">СДЕЛАТЬ СТАВКУ</button>
        </div>
    </div>

    <div class="modal" id="trade-modal">
        <div class="modal-content">
            <span class="close" onclick="closeTradeModal()">&times;</span>
            <h2 id="trade-modal-title">🔄 ОБМЕН</h2>
            <div id="trade-content"></div>
        </div>
    </div>

    <div class="modal" id="select-property-modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('select-property-modal')">&times;</span>
            <h2 id="select-prop-title">🏠 ВЫБЕРИТЕ УЛИЦУ</h2>
            <div id="select-prop-list" style="max-height: 400px; overflow-y: auto;"></div>
        </div>
    </div>

    <script>
        // ==================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ====================
        let games = {};
        let currentGame = null;
        let currentPlayer = null;
        let selectedCharacter = 'dino';
        let selectedCell = null;
        let currentAuction = null;
        let auctionTimer = null;
        let updateInterval = null;
        let lobbyCleanupInterval = null;
        let isAdmin = false;

        // Трейд переменные
        let currentTrade = null;
        let tradeProposal = null;
        let selectingFor = null;

        const ADMIN_NAME = 'SuguruK';

        const charEmojis = {
            'dino': '🦖', 'duck': '🦆', 'car': '🚗', 'hat': '🧢',
            'ship': '⛵', 'dog': '🐕', 'cat': '🐱', 'penguin': '🐧'
        };

        const playerColors = [
            '#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', 
            '#FFEEAD', '#D4A5A5', '#9B59B6', '#3498DB'
        ];

        // ==================== ДАННЫЕ ПОЛЯ ====================
        const boardData = [
            { pos:0, name:"СТАРТ", price:0, color:"special", rent:[0] },
            { pos:1, name:"УЛ.ПОБЕДЫ", price:60, color:"brown", rent:[2,10,30,90,160,250], housePrice:50 },
            { pos:2, name:"КАЗНА", type:"chest", price:0, color:"special", rent:[0] },

        // ==================== АВТООБНОВЛЕНИЕ ====================
        function startAutoUpdate() {
            if (updateInterval) clearInterval(updateInterval);
            updateInterval = setInterval(() => {
                if (!currentGame || !currentGame.id) return;
                
                const saved = JSON.parse(localStorage.getItem('monopolyGames') || '{}');
                const updatedGame = saved[currentGame.id];
                
                if (!updatedGame) {
                    leaveToMenu();
                    return;
                }
                
                const stillInGame = updatedGame.players.some(p => p.id === currentPlayer.id);
                if (!stillInGame) {
                    showNotif('❌ Вас кикнули из лобби', 'error');
                    leaveToMenu();
                    return;
                }
                
                if (!currentGame.started && updatedGame.started) {
                    currentGame = updatedGame;
                    enterGame();
                    return;
                }
                
                currentGame = updatedGame;
                
                if (document.getElementById('lobby-screen').style.display === 'block') {
                    updateLobbyUI();
                } else if (document.getElementById('game-screen').style.display === 'block') {
                    renderBoard();
                    updatePlayersList();
                    updateTurnIndicator();
                    renderGameChat();
                }
            }, 300);
        }

        // ==================== ТАЙМЕР УДАЛЕНИЯ ====================
        function startLobbyCleanup() {
            if (lobbyCleanupInterval) clearInterval(lobbyCleanupInterval);
            lobbyCleanupInterval = setInterval(() => {
                const games = JSON.parse(localStorage.getItem('monopolyGames') || '{}');
                let changed = false;
                const now = Date.now();
                
                Object.keys(games).forEach(gameId => {
                    const game = games[gameId];
                    if (!game.started && game.createdAt && (now - game.createdAt) > 20 * 60 * 1000) {
                        delete games[gameId];
                        changed = true;
                        if (currentGame && currentGame.id === gameId) {
                            showNotif('❌ Лобби удалено (20 мин без старта)', 'error');
                            leaveToMenu();
                        }
                    }
                    if (game.players && game.players.length === 0) {
                        delete games[gameId];
                        changed = true;
                    }
                });
                
                if (changed) {
                    localStorage.setItem('monopolyGames', JSON.stringify(games));
                    if (document.getElementById('lobbies-list').style.display === 'block') {
                        showLobbies();
                    }
                }
            }, 5000);
        }

        function joinLobby(gameId) {
            const name = document.getElementById('player-name').value.trim();
            if (!name) return showNotif('Введите имя!', 'error');

            const games = JSON.parse(localStorage.getItem('monopolyGames') || '{}');
            const game = games[gameId];
            
            if (!game) return showNotif('Лобби не найдено', 'error');
            if (game.started) return showNotif('Игра уже началась', 'error');
            if (game.players.length >= game.maxPlayers) return showNotif('Лобби заполнено', 'error');
            if (game.players.some(p => p.name === name)) return showNotif('Имя занято', 'error');
            if (game.players.some(p => p.character === selectedCharacter)) return showNotif('Фигурка занята', 'error');

            currentPlayer = {
                id: 'p' + Date.now() + Math.random(),
                name: name,
                character: selectedCharacter,
                color: playerColors[game.players.length],
                isCreator: false,
                money: 1500,
                pos: 0,
                props: [],
                inJail: false,
                jailTurns: 0,
                jailCards: 0,
                alive: true
            };

            game.players.push(currentPlayer);
            
            if (!game.chats) game.chats = [];
            game.chats.push({
                sender: 'system',
                text: `👋 ${name} присоединился`,
                time: new Date().toLocaleTimeString()
            });
            
            currentGame = game;
            games[gameId] = game;
            localStorage.setItem('monopolyGames', JSON.stringify(games));
            
            enterLobby();
            startAutoUpdate();
        }

                    <div class="lobby-player-card">
                        <div class="lobby-player-avatar" style="background: ${player.color}">${charEmojis[player.character]}</div>

        function kickPlayer(playerId) {
            if (!currentPlayer.isCreator) return;
            const kickedPlayer = currentGame.players.find(p => p.id === playerId);
            if (!kickedPlayer) return;
            
            currentGame.players = currentGame.players.filter(p => p.id !== playerId);
            currentGame.chats.push({
                sender: 'system',
                text: `👢 ${kickedPlayer.name} кикнут`,

            const games = JSON.parse(localStorage.getItem('monopolyGames') || '{}');
            games[currentGame.id] = currentGame;
            localStorage.setItem('monopolyGames', JSON.stringify(games));

            if (!currentGame || !currentPlayer) return;
            
            currentGame.players = currentGame.players.filter(p => p.id !== currentPlayer.id);
            const games = JSON.parse(localStorage.getItem('monopolyGames') || '{}');
            
            if (currentPlayer.isCreator || currentGame.players.length === 0) {
                delete games[currentGame.id];

        // ==================== ПОЛЕ ====================
        function renderBoard() {
            const board = document.getElementById('board');
            if (!board) return;
            board.innerHTML = '';
            
            for (let row = 0; row < 11; row++) {
                for (let col = 0; col < 11; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'board-cell';
                    
                    if (row === 0 && col === 0) {
                        cell.innerHTML = '<div class="cell-name">СТАРТ</div>';
                        cell.onclick = () => showCellInfo(0);
                    } 
                    else if (row === 0 && col === 10) {
                        cell.innerHTML = '<div class="cell-name">ТЮРЬМА</div>';
                        cell.onclick = () => showCellInfo(10);
                    }
                    else if (row === 10 && col === 0) {
                        cell.innerHTML = '<div class="cell-name">ПАРКОВКА</div>';
                        cell.onclick = () => showCellInfo(20);
                    }
                    else if (row === 10 && col === 10) {
                        cell.innerHTML = '<div class="cell-name">В ТЮРЬМУ</div>';
                        cell.onclick = () => showCellInfo(30);
                    }
                    else if (row === 0 && col > 0 && col < 10) {
                        addPropertyCell(cell, col);
                    }
                    else if (row === 10 && col > 0 && col < 10) {
                        addPropertyCell(cell, 30 - col);
                    }
                    else if (col === 0 && row > 0 && row < 10) {
                        addPropertyCell(cell, 20 - row);
                    }
                    else if (col === 10 && row > 0 && row < 10) {
                        addPropertyCell(cell, 9 + row);
                    }
                    else if (row >= 2 && row <= 9 && col >= 2 && col <= 9) {
                        if (row === 5 && col === 5) {
                            cell.innerHTML = `
                                <div style="display: flex; gap: 10px;">
                                    <div style="width:60px;height:80px;background:#ffedd5;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:2em;cursor:pointer;" onclick="drawChance()">🎲</div>
                                    <div style="width:60px;height:80px;background:#dbeafe;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:2em;cursor:pointer;" onclick="drawChest()">📦</div>
                                </div>
                            `;
                        } else {
                            cell.style.background = '#e5e7eb';
                        }
                    }
                    
                    const pos = getPosFromCell(row, col);
                    if (pos !== -1) {
                        const playersHere = currentGame.players.filter(p => p.pos === pos && p.alive);
                        if (playersHere.length) {
                            const tokensDiv = document.createElement('div');
                            tokensDiv.className = 'player-tokens';
                            playersHere.forEach(p => {
                                const tok = document.createElement('div');
                                tok.className = 'token';
                                tok.style.backgroundColor = p.color;
                                tok.textContent = charEmojis[p.character];
                                tok.title = p.name;
                                tokensDiv.appendChild(tok);
                            });
                            cell.appendChild(tokensDiv);
                        }
                    }
                    
                    board.appendChild(cell);
                }
            }
        }

        function addPropertyCell(cell, pos) {
            const prop = currentGame.board[pos];
            if (!prop) return;
            
            if (prop.color !== 'special' && prop.color !== 'tax') {
                const strip = document.createElement('div');
                strip.className = `color-strip ${prop.color}`;
                cell.appendChild(strip);
            }
            
            cell.innerHTML += `<div class="cell-name">${prop.name}</div>`;
            if (prop.price) cell.innerHTML += `<div>${prop.price}</div>`;
            
            if (prop.houses > 0 || prop.hotel) {
                const bDiv = document.createElement('div');
                bDiv.className = 'buildings';
                if (prop.hotel) {
                    bDiv.innerHTML = '<div class="building hotel"></div>';
                } else {
                    for (let i = 0; i < prop.houses; i++) {
                        bDiv.innerHTML += '<div class="building house"></div>';
                    }
                }
                cell.appendChild(bDiv);
            }
            
            cell.onclick = () => showCellInfo(pos);
        }

        function getPosFromCell(row, col) {
            if (row === 0 && col === 0) return 0;
            if (row === 0 && col === 10) return 10;
            if (row === 10 && col === 0) return 20;
            if (row === 10 && col === 10) return 30;
            if (row === 0 && col > 0 && col < 10) return col;
            if (row === 10 && col > 0 && col < 10) return 30 - col;
            if (col === 0 && row > 0 && row < 10) return 20 - row;
            if (col === 10 && row > 0 && row < 10) return 9 + row;
            return -1;
        }

        function showCellInfo(pos) {
            const prop = currentGame.board[pos];
            let msg = `${prop.name}\n`;
            if (prop.owner) {
                const owner = currentGame.players.find(p => p.id === prop.owner);
                msg += `Владелец: ${owner.name}\nАренда: ${prop.rent[prop.houses || 0]}`;
            } else if (prop.price > 0) {
                msg += `Цена: ${prop.price}💰\nАренда: ${prop.rent[0]}`;
            }
            showNotif(msg);
        }

        // ==================== ИГРОВАЯ МЕХАНИКА ====================
        function rollDice() {
            if (!currentGame.started) return showNotif('Игра не начата', 'error');
            if (currentPlayer.id !== currentGame.turn) return showNotif('Не ваш ход', 'error');
            if (currentGame.diceRolled) return showNotif('Вы уже бросили', 'error');
            
            const d1 = Math.floor(Math.random() * 6) + 1;
            const d2 = Math.floor(Math.random() * 6) + 1;
            document.getElementById('dice1').textContent = ['⚀','⚁','⚂','⚃','⚄','⚅'][d1-1];
            document.getElementById('dice2').textContent = ['⚀','⚁','⚂','⚃','⚄','⚅'][d2-1];
            
            const player = getCurrentPlayer();
            const oldPos = player.pos;
            const total = d1 + d2;
            
            // Движение фишки
            let steps = total;
            const moveInterval = setInterval(() => {
                if (steps === 0) {
                    clearInterval(moveInterval);
                    afterMove();
                    return;
                }
                player.pos = (player.pos + 1) % 40;
                renderBoard();
                steps--;
            }, 200);
            
            function afterMove() {
                if (player.pos < oldPos && oldPos !== 0) {
                    player.money += 200;
                    addGameChat('system', `${player.name} +200 за Старт`);
                }
                
                const land = currentGame.board[player.pos];
                
                if (land.type === 'tax') {
                    if (player.money >= land.price) {
                        player.money -= land.price;
                        currentGame.jackpot += land.price;
                    } else bankrupt(player);
                }
                else if (land.type === 'gotojail') {
                    player.inJail = true;
                    player.pos = 10;
                    addGameChat('system', `${player.name} в тюрьму`);
                }
                else if (land.type === 'chance') {
                    drawChance();
                }
                else if (land.type === 'chest') {
                    drawChest();
                }
                else if (land.price > 0 && !land.owner) {
                    selectedCell = player.pos;
                    showPropModal(land);
                }
                else if (land.owner && land.owner !== player.id) {
                    payRent(player, land);
                }
                
                currentGame.diceRolled = true;
                if (d1 !== d2) {
                    nextTurn();
                } else {
                    showNotif('ДУБЛЬ! Ещё ход', 'warning');
                    currentGame.diceRolled = false;
                }
                
                const games = JSON.parse(localStorage.getItem('monopolyGames') || '{}');
                games[currentGame.id] = currentGame;
                localStorage.setItem('monopolyGames', JSON.stringify(games));
            }
        }

        function payRent(player, prop) {
            let rent = prop.rent[prop.houses || 0];
            if (prop.color === 'railroad') {
                const owner = getPlayerById(prop.owner);
                const cnt = owner.props.filter(p => currentGame.board[p].color === 'railroad').length;
                rent = [25, 50, 100, 200][cnt-1];
            }
            if (player.money >= rent) {
                player.money -= rent;
                getPlayerById(prop.owner).money += rent;
                addGameChat('system', `${player.name} заплатил ${rent}💰`);
            } else bankrupt(player, prop.owner);
        }

        function drawChance() {
            const card = chanceCards[Math.floor(Math.random() * chanceCards.length)];
            applyCard(card);
            addGameChat('system', `${currentPlayer.name}: ШАНС — ${card.text}`);
        }

        function drawChest() {
            const card = chestCards[Math.floor(Math.random() * chestCards.length)];
            applyCard(card);
            addGameChat('system', `${currentPlayer.name}: КАЗНА — ${card.text}`);
        }

        function applyCard(card) {
            const player = getCurrentPlayer();
            if (card.money) player.money += card.money;
            if (card.jail) { player.inJail = true; player.pos = 10; }
            if (card.pos !== undefined) player.pos = card.pos;
            if (card.jailCard) player.jailCards++;
            
            const games = JSON.parse(localStorage.getItem('monopolyGames') || '{}');
            games[currentGame.id] = currentGame;
            localStorage.setItem('monopolyGames', JSON.stringify(games));
        }

        function buyProperty() {
            if (selectedCell === null) return;
            const player = getCurrentPlayer();
            const prop = currentGame.board[selectedCell];
            if (player.money >= prop.price) {
                player.money -= prop.price;
                prop.owner = player.id;
                player.props.push(selectedCell);
                addGameChat('system', `${player.name} купил ${prop.name}`);
                showNotif(`✅ Куплено!`);
            } else showNotif('❌ Не хватает денег', 'error');
            closeModal('property-modal');
            
            const games = JSON.parse(localStorage.getItem('monopolyGames') || '{}');
            games[currentGame.id] = currentGame;
            localStorage.setItem('monopolyGames', JSON.stringify(games));
        }

        function openAuctionModal() {
            closeModal('property-modal');
            const prop = currentGame.board[selectedCell];
            currentAuction = { prop, bid: 10, leader: null, timer: 5, active: false };
            document.getElementById('auction-info').innerHTML = `
                <p>Лот: <strong>${prop.name}</strong></p>
                <p>💰 Ставка: <span id="current-bid">10</span></p>
                <p>👑 Лидер: <span id="bid-leader">—</span></p>
                <p>⏳ <span id="auction-timer">5</span>с</p>
            `;
            openModal('auction-modal');
        }

        function placeBid() {
            if (!currentAuction) return;
            const amount = parseInt(document.getElementById('bid-amount').value);
            if (amount < 10 || amount <= currentAuction.bid) return showNotif('Ставка должна быть больше', 'error');
            if (amount > currentPlayer.money) return showNotif('Не хватает денег', 'error');
            
            currentAuction.bid = amount;
            currentAuction.leader = currentPlayer.id;
            currentAuction.timer = 5;
            currentAuction.active = true;
            document.getElementById('current-bid').textContent = amount;
            document.getElementById('bid-leader').textContent = currentPlayer.name;
            
            if (auctionTimer) clearInterval(auctionTimer);
            auctionTimer = setInterval(() => {
                currentAuction.timer--;
                document.getElementById('auction-timer').textContent = currentAuction.timer;
                if (currentAuction.timer <= 0) {
                    clearInterval(auctionTimer);
                    endAuction();
                }
            }, 1000);
        }

        function endAuction() {
            if (!currentAuction) return;
            if (currentAuction.leader) {
                const winner = getPlayerById(currentAuction.leader);
                winner.money -= currentAuction.bid;
                currentAuction.prop.owner = winner.id;
                winner.props.push(selectedCell);
                addGameChat('system', `🏆 ${winner.name} выиграл аукцион за ${currentAuction.bid}💰`);
            }
            currentAuction = null;
            closeModal('auction-modal');
            
            const games = JSON.parse(localStorage.getItem('monopolyGames') || '{}');
            games[currentGame.id] = currentGame;
            localStorage.setItem('monopolyGames', JSON.stringify(games));
        }

        function buildHouse() {
            if (currentPlayer.id !== currentGame.turn) return showNotif('Не ваш ход', 'error');
            const player = getCurrentPlayer();
            const buildable = player.props.find(pos => {
                const p = currentGame.board[pos];
                return p.housePrice && !p.hotel && (p.houses || 0) < 4 && hasFullGroup(p.color);
            });
            if (!buildable) return showNotif('Нет доступных для стройки', 'error');
            const prop = currentGame.board[buildable];
            if (player.money >= prop.housePrice) {
                player.money -= prop.housePrice;
                prop.houses = (prop.houses || 0) + 1;
                addGameChat('system', `${player.name} построил дом на ${prop.name}`);
                
                const games = JSON.parse(localStorage.getItem('monopolyGames') || '{}');
                games[currentGame.id] = currentGame;
                localStorage.setItem('monopolyGames', JSON.stringify(games));
            }
        }

        function buildHotel() {
            if (currentPlayer.id !== currentGame.turn) return showNotif('Не ваш ход', 'error');
            const player = getCurrentPlayer();
            const hotelable = player.props.find(pos => {
                const p = currentGame.board[pos];
                return p.houses === 4 && !p.hotel;
            });
            if (!hotelable) return showNotif('Нет улиц с 4 домами', 'error');
            const prop = currentGame.board[hotelable];
            if (player.money >= prop.housePrice) {
                player.money -= prop.housePrice;
                prop.hotel = true;
                prop.houses = 0;
                addGameChat('system', `${player.name} построил отель на ${prop.name}`);
                
                const games = JSON.parse(localStorage.getItem('monopolyGames') || '{}');
                games[currentGame.id] = currentGame;
                localStorage.setItem('monopolyGames', JSON.stringify(games));
            }
        }

        function hasFullGroup(color) {
            const player = getCurrentPlayer();
            const groupSizes = { brown:2, lightblue:3, pink:3, orange:3, red:3, yellow:3, green:3, blue:2 };
            const needed = groupSizes[color] || 2;
            const owned = player.props.filter(p => currentGame.board[p].color === color).length;
            return owned >= needed;
        }

        function nextTurn() {
            const alive = currentGame.players.filter(p => p.alive);
            let idx = alive.findIndex(p => p.id === currentGame.turn);
            idx = (idx + 1) % alive.length;
            currentGame.turn = alive[idx].id;
            currentGame.diceRolled = false;
            if (currentPlayer.id === currentGame.turn) showNotif('🎲 ВАШ ХОД!', 'warning');
            
            const games = JSON.parse(localStorage.getItem('monopolyGames') || '{}');
            games[currentGame.id] = currentGame;
            localStorage.setItem('monopolyGames', JSON.stringify(games));
        }

        function endTurn() {
            if (currentPlayer.id !== currentGame.turn) return showNotif('Не ваш ход', 'error');
            nextTurn();
        }

        // ==================== ЧАТ ИГРЫ ====================
        function sendGameChat() {
            const input = document.getElementById('game-chat-input');
            const text = input.value.trim();
            if (!text || !currentGame) return;
            
            if (!currentGame.gameChats) currentGame.gameChats = [];
            currentGame.gameChats.push({
                sender: currentPlayer.name,
                text: text,
                time: new Date().toLocaleTimeString()
            });
            
            if (currentGame.gameChats.length > 50) currentGame.gameChats.shift();
            
            const games = JSON.parse(localStorage.getItem('monopolyGames') || '{}');
            games[currentGame.id] = currentGame;
            localStorage.setItem('monopolyGames', JSON.stringify(games));
            
            input.value = '';
            renderGameChat();
        }

        function renderGameChat() {
            const container = document.getElementById('game-chat-messages');
            if (!container || !currentGame.gameChats) return;
            container.innerHTML = currentGame.gameChats.map(msg => `
                <div class="chat-message"><span class="chat-sender">${msg.sender}:</span> ${msg.text} <span style="float:right;color:var(--gray);">${msg.time}</span></div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }

        function addGameChat(sender, text) {
            if (!currentGame.gameChats) currentGame.gameChats = [];
            currentGame.gameChats.push({
                sender, text,
                time: new Date().toLocaleTimeString()
            });
            if (currentGame.gameChats.length > 50) currentGame.gameChats.shift();
            
            const games = JSON.parse(localStorage.getItem('monopolyGames') || '{}');
            games[currentGame.id] = currentGame;
            localStorage.setItem('monopolyGames', JSON.stringify(games));
        }

        // ==================== ТРЕЙД СИСТЕМА ====================
        function openTradeModal() {
            const others = currentGame.players.filter(p => p.id !== currentPlayer.id && p.alive);
            if (!others.length) return showNotif('Нет других игроков', 'error');
            
            let html = '<p>Выберите игрока:</p>';
            others.forEach(p => {
                html += `<button class="btn secondary" onclick="proposeTrade('${p.id}')" style="margin:5px 0;">${charEmojis[p.character]} ${p.name}</button>`;
            });
            
            document.getElementById('trade-content').innerHTML = html;
            openModal('trade-modal');
        }

        function proposeTrade(targetId) {
            const proposal = {
                id: 'prop_' + Date.now(),
                fromId: currentPlayer.id,
                fromName: currentPlayer.name,
                fromChar: currentPlayer.character,
                toId: targetId,
                status: 'pending'
            };
            
            if (!currentGame.trades) currentGame.trades = [];
            currentGame.trades.push(proposal);
            
            const games = JSON.parse(localStorage.getItem('monopolyGames') || '{}');
            games[currentGame.id] = currentGame;
            localStorage.setItem('monopolyGames', JSON.stringify(games));
            
            closeModal('trade-modal');
            showNotif(`✅ Предложение отправлено`, 'success');
        }

        // Проверка предложений
        setInterval(() => {
            if (currentGame && document.getElementById('game-screen').style.display === 'block') {
                const pending = currentGame.trades?.find(t => t.toId === currentPlayer.id && t.status === 'pending');
                if (pending && !document.getElementById('trade-notification')) {
                    showTradeNotification(pending);
                }
            }
        }, 1000);

        function showTradeNotification(proposal) {
            const notif = document.createElement('div');
            notif.className = 'trade-notification';
            notif.id = 'trade-notification';
            notif.innerHTML = `
                <h2>🔄 ПРЕДЛОЖЕНИЕ</h2>
                <p>${charEmojis[proposal.fromChar]} ${proposal.fromName} хочет обменяться!</p>
                <div class="trade-buttons">
                    <button class="btn primary" onclick="acceptTradeProposal('${proposal.id}')">✅ ПРИНЯТЬ</button>
                    <button class="btn danger" onclick="declineTradeProposal('${proposal.id}')">❌ ОТКЛОНИТЬ</button>
                </div>
            `;
            document.body.appendChild(notif);
        }

        function acceptTradeProposal(proposalId) {
            const proposal = currentGame.trades.find(t => t.id === proposalId);
            if (!proposal) return;
            
            currentTrade = {
                id: 'trade_' + Date.now(),
                player1Id: proposal.fromId,
                player1Name: proposal.fromName,
                player2Id: currentPlayer.id,
                player2Name: currentPlayer.name,
                props1: [],
                props2: [],
                money1: 0,
                money2: 0,
                accepted1: false,
                accepted2: false
            };
            
            currentGame.trades = currentGame.trades.filter(t => t.id !== proposalId);
            if (!currentGame.activeTrades) currentGame.activeTrades = [];
            currentGame.activeTrades.push(currentTrade);
            
            const games = JSON.parse(localStorage.getItem('monopolyGames') || '{}');
            games[currentGame.id] = currentGame;
            localStorage.setItem('monopolyGames', JSON.stringify(games));
            
            document.getElementById('trade-notification')?.remove();
            openTradeWindow();
        }

        function declineTradeProposal(proposalId) {
            currentGame.trades = currentGame.trades.filter(t => t.id !== proposalId);
            const games = JSON.parse(localStorage.getItem('monopolyGames') || '{}');
            games[currentGame.id] = currentGame;
            localStorage.setItem('monopolyGames', JSON.stringify(games));
            document.getElementById('trade-notification')?.remove();
            showNotif('❌ Предложение отклонено', 'info');
        }

        function openTradeWindow() {
            if (!currentTrade) return;
            
            const p1 = getPlayerById(currentTrade.player1Id);
            const p2 = getPlayerById(currentTrade.player2Id);
            const isP1 = currentPlayer.id === currentTrade.player1Id;
            
            document.getElementById('trade-modal-title').innerHTML = `🔄 ОБМЕН: ${p1.name} ⇄ ${p2.name}`;
            
            let html = `
                <div class="trade-container">
                    <div class="trade-column">
                        <h3>${charEmojis[p1.character]} ${p1.name}</h3>
                        <div id="props1-list">${renderTradeProps(currentTrade.props1)}</div>
                        ${isP1 ? `<button class="add-button" onclick="openPropertySelector('player1')">+</button>` : ''}
                        <input type="number" class="money-input" id="money1" value="${currentTrade.money1}" min="0" max="${p1.money}" onchange="updateTradeMoney('player1', this.value)" ${!isP1 ? 'disabled' : ''}>
                    </div>
                    <div class="trade-column">
                        <h3>${charEmojis[p2.character]} ${p2.name}</h3>
                        <div id="props2-list">${renderTradeProps(currentTrade.props2)}</div>
                        ${!isP1 ? `<button class="add-button" onclick="openPropertySelector('player2')">+</button>` : ''}
                        <input type="number" class="money-input" id="money2" value="${currentTrade.money2}" min="0" max="${p2.money}" onchange="updateTradeMoney('player2', this.value)" ${isP1 ? 'disabled' : ''}>
                    </div>
                </div>
                <div class="trade-buttons">
                    <button class="btn primary" onclick="acceptTrade()">✅ ПРИНЯТЬ</button>
                    <button class="btn danger" onclick="declineTrade()">❌ ОТКЛОНИТЬ</button>
                </div>
            `;
            
            document.getElementById('trade-content').innerHTML = html;
            openModal('trade-modal');
        }

        function renderTradeProps(props) {
            if (!props || props.length === 0) return '<p>Нет улиц</p>';
            return props.map(pos => {
                const p = currentGame.board[pos];
                return `<div class="property-item selected" onclick="removeProperty(${pos})">${p.name} (${p.price}💰)</div>`;
            }).join('');
        }

        function openPropertySelector(playerKey) {
            const player = getCurrentPlayer();
            const available = player.props.filter(pos => {
                if (playerKey === 'player1') return !currentTrade.props1.includes(pos);
                else return !currentTrade.props2.includes(pos);
            });
            
            if (available.length === 0) return showNotif('Нет доступных улиц', 'error');
            
            selectingFor = playerKey;
            document.getElementById('select-prop-title').innerHTML = `🏠 ВЫБЕРИТЕ УЛИЦУ`;
            
            let html = '';
            available.forEach(pos => {
                const p = currentGame.board[pos];
                html += `<div class="property-item" onclick="selectProperty(${pos})">${p.name} (${p.price}💰)</div>`;
            });
            
            document.getElementById('select-prop-list').innerHTML = html;
            openModal('select-property-modal');
        }

        function selectProperty(pos) {
            if (!selectingFor) return;
            
            if (selectingFor === 'player1') {
                currentTrade.props1.push(pos);
                getPlayerById(currentTrade.player1Id).props = getPlayerById(currentTrade.player1Id).props.filter(p => p !== pos);
            } else {
                currentTrade.props2.push(pos);
                getPlayerById(currentTrade.player2Id).props = getPlayerById(currentTrade.player2Id).props.filter(p => p !== pos);
            }
            
            closeModal('select-property-modal');
            
            const games = JSON.parse(localStorage.getItem('monopolyGames') || '{}');
            games[currentGame.id] = currentGame;
            localStorage.setItem('monopolyGames', JSON.stringify(games));
            
            openTradeWindow();
        }

        function removeProperty(pos) {
            if (currentTrade.props1.includes(pos) && currentPlayer.id === currentTrade.player1Id) {
                currentTrade.props1 = currentTrade.props1.filter(p => p !== pos);
                getPlayerById(currentTrade.player1Id).props.push(pos);
            } else if (currentTrade.props2.includes(pos) && currentPlayer.id === currentTrade.player2Id) {
                currentTrade.props2 = currentTrade.props2.filter(p => p !== pos);
                getPlayerById(currentTrade.player2Id).props.push(pos);
            }
            
            const games = JSON.parse(localStorage.getItem('monopolyGames') || '{}');
            games[currentGame.id] = currentGame;
            localStorage.setItem('monopolyGames', JSON.stringify(games));
            
            openTradeWindow();
        }

        function updateTradeMoney(playerKey, value) {
            const amount = parseInt(value) || 0;
            if (playerKey === 'player1' && currentPlayer.id === currentTrade.player1Id) {
                if (amount > getPlayerById(currentTrade.player1Id).money) return showNotif('Недостаточно денег', 'error');
                currentTrade.money1 = amount;
            } else if (playerKey === 'player2' && currentPlayer.id === currentTrade.player2Id) {
                if (amount > getPlayerById(currentTrade.player2Id).money) return showNotif('Недостаточно денег', 'error');
                currentTrade.money2 = amount;
            }
            
            const games = JSON.parse(localStorage.getItem('monopolyGames') || '{}');
            games[currentGame.id] = currentGame;
            localStorage.setItem('monopolyGames', JSON.stringify(games));
        }

        function acceptTrade() {
            if (!currentTrade) return;
            
            if (currentPlayer.id === currentTrade.player1Id) currentTrade.accepted1 = true;
            else currentTrade.accepted2 = true;
            
            if (currentTrade.accepted1 && currentTrade.accepted2) {
                const p1 = getPlayerById(currentTrade.player1Id);
                const p2 = getPlayerById(currentTrade.player2Id);
                
                p1.money = p1.money - currentTrade.money1 + currentTrade.money2;
                p2.money = p2.money - currentTrade.money2 + currentTrade.money1;
                
                currentTrade.props1.forEach(pos => {
                    currentGame.board[pos].owner = p2.id;
                    p2.props.push(pos);
                });
                
                currentTrade.props2.forEach(pos => {
                    currentGame.board[pos].owner = p1.id;
                    p1.props.push(pos);
                });
                
                addGameChat('system', `🤝 Обмен между ${p1.name} и ${p2.name} завершён!`);
                showNotif('✅ Обмен завершён!', 'success');
                
                currentGame.activeTrades = currentGame.activeTrades.filter(t => t.id !== currentTrade.id);
                currentTrade = null;
                closeModal('trade-modal');
            } else {
                showNotif('✅ Вы приняли, ждём второго', 'info');
                closeModal('trade-modal');
            }
            
            const games = JSON.parse(localStorage.getItem('monopolyGames') || '{}');
            games[currentGame.id] = currentGame;
            localStorage.setItem('monopolyGames', JSON.stringify(games));
        }

        function declineTrade() {
            if (!currentTrade) return;
            
            if (currentTrade.props1.length) {
                getPlayerById(currentTrade.player1Id).props.push(...currentTrade.props1);
            }
            if (currentTrade.props2.length) {
                getPlayerById(currentTrade.player2Id).props.push(...currentTrade.props2);
            }
            
            currentGame.activeTrades = currentGame.activeTrades.filter(t => t.id !== currentTrade.id);
            currentTrade = null;
            
            const games = JSON.parse(localStorage.getItem('monopolyGames') || '{}');
            games[currentGame.id] = currentGame;
            localStorage.setItem('monopolyGames', JSON.stringify(games));
            
            closeModal('trade-modal');
            showNotif('❌ Обмен отклонён', 'info');
        }

        function closeTradeModal() {
            closeModal('trade-modal');
        }

        // ==================== ОБНОВЛЕНИЕ ====================
        function updatePlayersList() {
            const container = document.getElementById('players-list');
            if (!container) return;
            container.innerHTML = currentGame.players.map(p => `
                <div class="player-card ${p.id === currentGame.turn ? 'current-turn' : ''}">
                    <div class="player-avatar" style="background: ${p.color}">${charEmojis[p.character]}</div>
                    <div>
                        <div class="player-name">${p.name} ${p.inJail ? '🚓' : ''}</div>
                        <div>💰 ${p.money}</div>
                        <div>🏠 ${p.props.length}</div>
                    </div>
                </div>
            `).join('');
        }

        function updateTurnIndicator() {
            const ind = document.getElementById('turn-indicator');
            if (!currentGame.started) ind.textContent = '⏳ ОЖИДАНИЕ...';
            else ind.textContent = `🎲 ХОДИТ: ${getPlayerById(currentGame.turn)?.name}`;
        }

        function showMyCards() {
            const me = getCurrentPlayer();
            if (!me.props.length) return showNotif('Нет собственности', 'info');
            let msg = '🏠 ВАША СОБСТВЕННОСТЬ:\n';
            me.props.forEach(pos => {
                const p = currentGame.board[pos];
                msg += `${p.name} — ${p.price}💰`;
                if (p.houses) msg += ` (${p.houses}🏠)`;
                if (p.hotel) msg += ` (🏨)`;
                msg += '\n';
            });
            showNotif(msg);
        }

        function showLobbies() {
            const games = JSON.parse(localStorage.getItem('monopolyGames') || '{}');
            const container = document.getElementById('lobbies-container');
            const listDiv = document.getElementById('lobbies-list');
            
            const available = Object.values(games).filter(g => !g.started && g.players.length < g.maxPlayers);

                        <div><strong>🔑 ${game.id}</strong> 👑 ${game.creatorName}</div>
                        <div>👥 ${game.players.length}/${game.maxPlayers}</div>
                        <div>🎭 ${game.players.map(p => charEmojis[p.character]).join(' ')}</div>
                        <button class="btn small ${charFree ? 'primary' : 'secondary'}" onclick="joinLobby('${game.id}')" ${!charFree ? 'disabled' : ''}>${charFree ? '✅ ПРИСОЕДИНИТЬСЯ' : '❌ ФИГУРКА ЗАНЯТА'}</button>
                    </div>
                `;
            }).join('') : '<p>Нет доступных лобби</p>';
            
            listDiv.style.display = 'block';
        }

        function getCurrentPlayer() { return currentGame.players.find(p => p.id === currentPlayer.id); }
        function getPlayerById(id) { return currentGame.players.find(p => p.id === id); }
        
        function showPropModal(prop) {
            document.getElementById('prop-name').textContent = prop.name;
            document.getElementById('prop-details').innerHTML = `
                <p>💰 Цена: ${prop.price}</p>
                <p>🏠 Аренда: ${prop.rent[0]}</p>
                ${prop.housePrice ? `<p>🏗️ Дом: ${prop.housePrice}</p>` : ''}
            `;
            openModal('property-modal');
        }
        
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        
        function showNotif(msg, type = 'info') {
            const n = document.createElement('div');
            n.className = `notification ${type}`;
            n.textContent = msg;
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 3000);
        }
        
        function leaveGame() { 
            if (confirm('Выйти?')) {
                if (updateInterval) clearInterval(updateInterval);
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('game-screen').style.display = 'none';
                currentGame = null;
                currentPlayer = null;
                currentTrade = null;
            }
        }

        window.onload = () => {
            games = JSON.parse(localStorage.getItem('monopolyGames') || '{}');
            selectChar('dino');
            startLobbyCleanup();
            checkAdmin();
        };
    </script>
